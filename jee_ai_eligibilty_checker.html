<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Seat Eligibility Checker — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --brand: #dc2626; --brand-d: #991b1b; --brand-soft: #fef2f2; --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #0f172a; --ink2: #475569; --muted: #94a3b8; --bg: #f8fafc; --card: #ffffff; --stroke: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding-top: 80px; }
    
    .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 24px 100px; }
    .tool-card-wrap { max-width: 800px; margin: 0 auto; }
    
    .page-hero { 
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%); 
      border-radius: 32px; padding: 48px 40px; margin-bottom: 40px; color: #fff; 
      box-shadow: 0 20px 40px var(--brand-ring); position: relative; overflow: hidden;
      max-width: 800px; margin-left: auto; margin-right: auto;
    }
    .page-hero h1 { font-family: 'Lexend', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; position: relative; }
    .page-hero p { font-size: 16px; opacity: 0.9; line-height: 1.6; max-width: 580px; position: relative; }

    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; color: var(--ink2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    
    input, select { 
      width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--stroke); border-radius: 16px; 
      font-family: inherit; font-size: 15px; font-weight: 500; outline: none; transition: all 0.2s; background: var(--bg);
    }
    input:focus, select:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 5px var(--brand-ring); }

    .btn { 
      width: 100%; padding: 18px; background: linear-gradient(135deg, var(--brand), var(--brand-d)); color: #fff; border: none; border-radius: 20px; 
      font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; transition: 0.3s; 
      box-shadow: 0 10px 25px var(--brand-ring); display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--brand-ring); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .loader-wrap { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 12px; justify-content: center; }
    .spinner { width: 18px; height: 18px; border: 3px solid var(--stroke); border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULTS TABLE */
    .results-area { margin-top: 40px; display: none; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
    .results-area.active { display: block; animation: fadeIn 0.5s ease; }
    .results-card { background: var(--card); border: 1px solid var(--stroke); border-radius: 24px; box-shadow: var(--shadow-lg); overflow: hidden; }
    .results-head { padding: 24px 32px; border-bottom: 1px solid var(--stroke); display: flex; justify-content: space-between; align-items: center; }
    .results-head h2 { font-family: 'Lexend', sans-serif; font-size: 20px; font-weight: 800; }
    
    .table-scroll { overflow: visible; }
    table { width: 100%; border-collapse: collapse; table-layout: auto; }
    
    @media (max-width: 1024px) {
      .table-scroll { overflow-x: auto; }
      table { min-width: 900px; }
      .results-area { margin-left: -20px; margin-right: -20px; width: calc(100% + 40px); }
    }
    th { background: #f9fafb; padding: 12px 10px; text-align: left; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--stroke); white-space: nowrap; }
    td { padding: 14px 10px; font-size: 12.5px; border-bottom: 1px solid var(--stroke); }
    .col-rank { width: 90px; white-space: nowrap; }
    .col-perc { width: 100px; white-space: nowrap; }
    .col-code { width: 80px; }
    .col-pool { width: 60px; }
    .col-action { width: 100px; }
    .college-code { font-family: monospace; background: var(--brand-soft); color: var(--brand); padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; }
    
    .table-scroll::-webkit-scrollbar { height: 6px; }
    .table-scroll::-webkit-scrollbar-track { background: var(--bg); }
    .table-scroll::-webkit-scrollbar-thumb { background: var(--stroke); border-radius: 10px; }
    .table-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    .visit-btn { color: var(--brand); text-decoration: none; font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .visit-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div class="page-hero">
        <h1>AI Seat Eligibility Checker</h1>
        <p>Advanced eligibility analysis for All India (AI) seats in Maharashtra engineering colleges based on your JEE Mains performance.</p>
      </div>

      <div class="tool-card-wrap">
        <div class="card">
          <div class="form-group">
            <label class="form-label">Input Method</label>
            <div style="display:flex; gap:20px; margin-top:8px; margin-bottom:12px;">
              <label style="display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; cursor:pointer;">
                <input type="radio" name="method" value="Percentile" checked style="width:auto; height:auto; padding:0; margin:0"> JEE Percentile
              </label>
              <label style="display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; cursor:pointer;">
                <input type="radio" name="method" value="Rank" style="width:auto; height:auto; padding:0; margin:0"> All India Rank
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" id="scoreLabel">JEE Mains Percentile</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <input type="number" id="inScore" placeholder="e.g. 96.5" step="0.0001" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Preferred Branch</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              <select id="inBranch">
                <option value="All">All Branches</option>
                <option value="Computer Engineering">Computer Engineering</option>
                <option value="Information Technology">Information Technology</option>
                <option value="Electronics and Telecommunication Engg">Electronics & Telecomm</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Region Filter</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <select id="inRegion">
                <option value="All">All Maharashtra</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Pune">Pune</option>
                <option value="Nagpur">Nagpur</option>
                <option value="Amravati">Amravati</option>
                <option value="Aurangabad">Aurangabad</option>
              </select>
            </div>
          </div>

          <button class="btn" id="predictBtn" onclick="checkEligibility()" disabled>
            Analyze AI Seats
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
          <div id="dataLoader" class="loader-wrap">
            <div class="spinner"></div>
            <span>Synchronizing eligibility matrix...</span>
          </div>
        </div>
      </div>

      <div id="resultsArea" class="results-area">
        <div class="results-card">
          <div class="results-head">
            <div>
              <h2>Eligibility Results</h2>
              <div id="resultCount" style="font-size:12px; font-weight:700; color:var(--muted); margin-top:4px">0 matches found</div>
            </div>
            <button class="btn" style="width:auto; padding:10px 20px; font-size:13px; margin:0" onclick="downloadPDF()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download Report
            </button>
          </div>
          <div class="table-scroll">
            <table id="resultsTable">
              <thead>
                <tr>
                  <th>#</th>
                  <th class="col-code">Code</th>
                  <th>College</th>
                  <th>Branch</th>
                  <th class="col-pool">Pool</th>
                  <th class="col-rank">Rank</th>
                  <th class="col-perc">Percentile</th>
                  <th class="col-action">Action</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';
    let data = [];

    function checkEligibility() {
      const scoreVal = document.getElementById('inScore').value;
      const score = parseFloat(scoreVal);
      const method = document.querySelector('input[name="method"]:checked').value;
      const branch = document.getElementById('inBranch').value;
      const region = document.getElementById('inRegion').value;

      if (!scoreVal || isNaN(score)) return alert('Please enter a valid ' + method);

      let filtered = [];
      if (method === 'Percentile') {
        filtered = data.filter(r => r.percentile <= score && r.percentile > 0).sort((a,b) => b.percentile - a.percentile);
      } else {
        filtered = data.filter(r => r.meritRank >= score && r.meritRank > 0).sort((a,b) => a.meritRank - b.meritRank);
      }

      if (branch !== 'All') filtered = filtered.filter(r => (r.branch||'').includes(branch));
      if (region !== 'All') filtered = filtered.filter(r => (r.region||'').includes(region));

      const tbody = document.querySelector('#resultsTable tbody');
      document.getElementById('resultCount').textContent = `${filtered.length} matching colleges found`;
      
      tbody.innerHTML = filtered.slice(0, 100).map((r, i) => `
        <tr>
          <td style="color:var(--muted)">${i + 1}</td>
          <td><span class="college-code">${r.code || '—'}</span></td>
          <td style="font-weight:600; max-width:300px">${r.name || '—'}</td>
          <td style="color:var(--ink2)">${r.branch || '—'}</td>
          <td>${r.seatType || 'AI'}</td>
          <td style="font-weight:700">#${r.meritRank || '—'}</td>
          <td style="font-weight:800; color:var(--brand)">${r.percentile ? r.percentile.toFixed(7) : '—'}</td>
          <td>
            <a href="https://fe2025.mahacet.org/StaticPages/frmInstituteSummary?InstituteCode=${String(r.code || '').padStart(5, '0')}" target="_blank" class="visit-btn">
              Visit Portal
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
          </td>
        </tr>
      `).join('');

      const area = document.getElementById('resultsArea');
      area.classList.add('active');
      area.scrollIntoView({ behavior: 'smooth' });
      
      // Save current filtered data for PDF
      window.lastResults = filtered.slice(0, 100);
    }

    function downloadPDF() {
      if (!window.lastResults || window.lastResults.length === 0) return alert('No results to export');
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('l', 'pt', 'a4');
      
      doc.setFontSize(22);
      doc.setTextColor(220, 38, 38);
      doc.text("College Simplified - Eligibility Report", 40, 50);
      
      doc.setFontSize(10);
      doc.setTextColor(100);
      doc.text(`Generated on: ${new Date().toLocaleDateString()} | Total Matches: ${window.lastResults.length}`, 40, 75);

      doc.autoTable({
        startY: 100,
        head: [['#', 'Code', 'College', 'Branch', 'Pool', 'Rank', 'Percentile']],
        body: window.lastResults.map((r, i) => [
          i + 1, 
          r.code || '—', 
          r.name || '—', 
          r.branch || '—', 
          r.seatType || 'AI',
          r.meritRank || '—',
          r.percentile ? r.percentile.toFixed(7) : '—'
        ]),
        theme: 'grid',
        styles: { fontSize: 8 },
        headStyles: { fillColor: [220, 38, 38] }
      });
      doc.save("JEE_Eligibility_Report.pdf");
    }

    function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;
      fetch('jee_data.json').then(r => r.json()).then(json => {
        const raw = Array.isArray(json) ? json : (json[Object.keys(json)[0]] || []);
        data = raw.map(r => ({
          exam: 'JEE',
          code: r["College Code"] || r["Institute Code"],
          name: r["Institute Name"] || r["Institute"],
          branch: r["Branch Name"] || r["Branch"],
          percentile: parseFloat(r["JEE Percentile"] || r["Percentile"] || 0),
          meritRank: parseInt(r["All India Merit"] || r["Rank"] || 0),
          region: r["Region"],
          seatType: r["Seat Type"] || 'AI',
          url: r["College Url"] || '#'
        }));
        
        document.getElementById('predictBtn').disabled = false;
        document.getElementById('dataLoader').style.display = 'none';

        document.querySelectorAll('input[name="method"]').forEach(r => r.onchange = () => {
          const m = document.querySelector('input[name="method"]:checked').value;
          document.getElementById('scoreLabel').textContent = m === 'Rank' ? 'All India Rank' : 'JEE Mains Percentile';
          document.getElementById('inScore').placeholder = m === 'Rank' ? 'e.g. 24500' : 'e.g. 96.5';
        });
      }).catch(err => {
        console.error("Data load fail:", err);
        document.getElementById('dataLoader').innerHTML = '<span style="color:var(--brand)">Failed to load data. Please refresh.</span>';
      });
    }

    window.checkEligibility = checkEligibility;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
