<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Seat Eligibility Checker — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626; --brand-d: #991b1b; --brand-soft: #fef2f2; --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #0f172a; --ink2: #475569; --muted: #94a3b8; --bg: #f8fafc; --card: #ffffff; --stroke: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding-top: 80px; }
    
    .wrap { max-width: 800px; margin: 0 auto; padding: 40px 24px 100px; }
    
    .page-hero { 
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%); 
      border-radius: 32px; padding: 48px 40px; margin-bottom: 40px; color: #fff; 
      box-shadow: 0 20px 40px var(--brand-ring); position: relative; overflow: hidden;
    }
    .page-hero h1 { font-family: 'Lexend', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; position: relative; }
    .page-hero p { font-size: 16px; opacity: 0.9; line-height: 1.6; max-width: 580px; position: relative; }

    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; color: var(--ink2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    
    input, select { 
      width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--stroke); border-radius: 16px; 
      font-family: inherit; font-size: 15px; font-weight: 500; outline: none; transition: all 0.2s; background: var(--bg);
    }
    input:focus, select:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 5px var(--brand-ring); }

    .btn { 
      width: 100%; padding: 18px; background: linear-gradient(135deg, var(--brand), var(--brand-d)); color: #fff; border: none; border-radius: 20px; 
      font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; transition: 0.3s; 
      box-shadow: 0 10px 25px var(--brand-ring); display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--brand-ring); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .loader-wrap { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 12px; justify-content: center; }
    .spinner { width: 18px; height: 18px; border: 3px solid var(--stroke); border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div class="page-hero">
        <h1>AI Seat Eligibility Checker</h1>
        <p>Advanced eligibility analysis for All India (AI) seats in Maharashtra engineering colleges based on your JEE Mains rank.</p>
      </div>

      <div class="card">
        <div class="form-group">
          <label class="form-label">JEE Mains Rank</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <input type="number" id="inRank" placeholder="e.g. 25000" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Preferred Branch</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <select id="inBranch">
              <option value="All">All Branches</option>
              <option value="Computer Engineering">Computer Engineering</option>
              <option value="Information Technology">Information Technology</option>
              <option value="Electronics and Telecommunication Engg">Electronics & Telecomm</option>
              <option value="Mechanical Engineering">Mechanical Engineering</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Region Filter</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <select id="inRegion">
              <option value="All">All Maharashtra</option>
              <option value="Mumbai">Mumbai</option>
              <option value="Pune">Pune</option>
              <option value="Nagpur">Nagpur</option>
              <option value="Amravati">Amravati</option>
              <option value="Aurangabad">Aurangabad</option>
            </select>
          </div>
        </div>

        <button class="btn" id="predictBtn" onclick="checkEligibility()" disabled>
          Analyze AI Seats
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <div id="dataLoader" class="loader-wrap">
          <div class="spinner"></div>
          <span>Synchronizing eligibility matrix...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';
    let data = [];

    function checkEligibility() {
      const rankVal = document.getElementById('inRank').value;
      const rank = parseInt(rankVal);
      const branch = document.getElementById('inBranch').value;
      const region = document.getElementById('inRegion').value;

      if (!rankVal || isNaN(rank)) return alert('Please enter a valid rank');

      let filtered = data.filter(r => r.meritRank >= rank);

      if (branch !== 'All') filtered = filtered.filter(r => r.branch.includes(branch));
      if (region !== 'All') filtered = filtered.filter(r => (r.region||'').includes(region));

      filtered.sort((a,b) => a.meritRank - b.meritRank);

      localStorage.setItem("results", JSON.stringify(filtered.slice(0, 80)));
      window.location.href = "results.html";
    }

    function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;
      fetch('jee_data.json').then(r => r.json()).then(json => {
        const raw = Array.isArray(json) ? json : (json[Object.keys(json)[0]] || []);
        data = raw.map(r => ({
          exam: 'JEE',
          code: r["College Code"] || r["Institute Code"],
          name: r["Institute Name"] || r["Institute"],
          branch: r["Branch Name"] || r["Branch"],
          percentile: parseFloat(r["JEE Percentile"] || r["Percentile"] || 0),
          meritRank: parseInt(r["All India Merit"] || r["Rank"] || 0),
          region: r["Region"],
          seatType: r["Seat Type"] || 'AI',
          url: r["College Url"] || '#'
        }));
        
        document.getElementById('predictBtn').disabled = false;
        document.getElementById('dataLoader').style.display = 'none';
      }).catch(err => {
        console.error("Data load fail:", err);
        document.getElementById('dataLoader').innerHTML = '<span style="color:var(--brand)">Failed to load data. Please refresh.</span>';
      });
    }

    window.checkEligibility = checkEligibility;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
