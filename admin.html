<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626;
      /* Same Red as Landing */
      --brand-d: #991b1b;
      --brand-soft: #fef2f2;
      --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #111827;
      --ink2: #374151;
      --muted: #6b7280;
      --bg: #fafafa;
      --card: #ffffff;
      --stroke: rgba(0, 0, 0, 0.08);
      --inp: #ffffff;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --green: #10b981;
      --green-bg: #ecfdf5;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --blue: #dc2626;
      --blue-bg: #fef2f2;
    }

    [data-theme="dark"] {
      --brand: #ef4444;
      --brand-d: #dc2626;
      --brand-soft: rgba(220, 38, 38, 0.1);
      --ink: #f9fafb;
      --ink2: #e5e7eb;
      --muted: #9ca3af;
      --bg: #030712;
      --card: #111827;
      --stroke: #1f2937;
      --inp: #1f2937;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden
    }

    /* Layout */
    .admin-layout {
      display: flex;
      min-height: 100vh
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--card);
      border-right: 1px solid var(--stroke);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 300;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1)
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      padding: 0 10px
    }

    .sidebar-logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--brand), var(--brand-d));
      color: #fff;
      display: grid;
      place-items: center;
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 8px 20px var(--brand-ring)
    }

    .sidebar-name {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--ink);
      line-height: 1.2
    }

    .sidebar-name span {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none
    }

    .nav-item {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      transition: all .2s ease;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.5;
      transition: transform .2s
    }

    .nav-item:hover {
      background: var(--bg);
      color: var(--ink);
      transform: translateX(4px)
    }

    .nav-item.active {
      background: var(--brand-soft);
      color: var(--brand);
      box-shadow: inset 0 0 0 1px var(--brand-ring)
    }

    .nav-item.active svg {
      stroke: var(--brand)
    }

    /* Main Content */
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg)
    }

    .topbar {
      height: 72px;
      background: var(--card);
      border-bottom: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(12px)
    }

    .page-header {
      display: flex;
      flex-direction: column
    }

    .page-title {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--ink)
    }

    .content {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%
    }

    /* Stats Section */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 32px
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      padding: 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: var(--shadow);
      transition: all .3s ease
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--brand)
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      transition: transform .3s ease
    }

    .stat-card:hover .stat-icon {
      transform: scale(1.1)
    }

    .stat-icon.users {
      background: var(--blue-bg);
      color: var(--blue)
    }

    .stat-icon.states {
      background: var(--green-bg);
      color: var(--green)
    }

    .stat-icon.notifs {
      background: var(--brand-soft);
      color: var(--brand)
    }

    .stat-info .val {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 28px;
      line-height: 1;
      color: var(--ink)
    }

    .stat-info .lbl {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 6px
    }

    /* Panels & Tables */
    .panel {
      display: none;
      animation: panelSlideIn .4s cubic-bezier(0.16, 1, 0.3, 1)
    }

    .panel.active {
      display: block
    }

    @keyframes panelSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap
    }

    .search-container {
      position: relative;
      flex: 1;
      max-width: 500px;
      width: 100%
    }

    .search-container svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 1.5px solid var(--stroke);
      border-radius: 16px;
      font-size: 15px;
      background: var(--card);
      color: var(--ink);
      font-family: inherit;
      outline: none;
      transition: all .2s;
      box-shadow: var(--shadow)
    }

    .search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-ring);
      background: var(--card)
    }

    .table-container {
      background: var(--card);
      border-radius: 24px;
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      overflow: hidden
    }

    .table-scroll {
      overflow-x: auto
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      background: var(--bg);
      font-weight: 700;
      text-align: left;
      padding: 18px 24px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--stroke)
    }

    td {
      padding: 18px 24px;
      border-bottom: 1px solid var(--stroke);
      color: var(--ink);
      font-size: 14px;
      vertical-align: middle;
      transition: background .15s
    }

    tr:last-child td {
      border-bottom: none
    }

    tr:hover td {
      background: var(--brand-soft)
    }

    table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: -10px; }
    th { padding: 12px 24px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 800; text-align: left; }
    td { padding: 16px 24px; background: var(--card); border-top: 1px solid var(--stroke); border-bottom: 1px solid var(--stroke); vertical-align: middle; }
    td:first-child { border-left: 1px solid var(--stroke); border-radius: 20px 0 0 20px; }
    td:last-child { border-right: 1px solid var(--stroke); border-radius: 0 20px 20px 0; }
    tr:hover td { border-color: var(--brand-ring); background: var(--brand-soft); transition: all 0.2s; }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--brand-soft);
      color: var(--brand);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 16px;
      box-shadow: inset 0 0 0 1px var(--brand-ring)
    }

    /* Forms */
    .card-section {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 28px;
      padding: 40px;
      max-width: 800px;
      box-shadow: var(--shadow-lg);
      margin: 0 auto
    }

    .card-section h3 {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .form-group {
      margin-bottom: 24px
    }

    .form-label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      color: var(--ink2);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px
    }

    .form-control {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--stroke);
      border-radius: 16px;
      font-size: 15px;
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      outline: none;
      transition: all .2s ease
    }

    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-ring);
      background: var(--card)
    }

    textarea.form-control {
      min-height: 120px;
      resize: vertical
    }

    /* Buttons */
    .btn {
      padding: 12px 24px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-d));
      color: #fff;
      box-shadow: 0 4px 12px var(--brand-ring)
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--brand-ring);
      filter: brightness(1.1)
    }

    .btn-primary:active {
      transform: translateY(0)
    }

    .btn-outline {
      background: var(--card);
      border: 1.5px solid var(--stroke);
      color: var(--ink2)
    }

    .btn-outline:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-soft)
    }

    .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      font-weight: 600
    }

    .btn-danger:hover {
      background: var(--brand);
      color: #fff;
      transform: translateY(-2px)
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(8px);
      animation: fadeIn .3s ease
    }

    .modal-overlay.show {
      display: flex
    }

    .modal-card {
      background: var(--card);
      border-radius: 32px;
      padding: 40px;
      max-width: 550px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
      position: relative
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* Toast */
    .toast-wrap {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none
    }

    .toast {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 20px;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: all;
      animation: toastSlideIn .4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--ink);
      border-left: 4px solid var(--brand)
    }

    @keyframes toastSlideIn {
      from {
        transform: translateX(100%) scale(0.9);
        opacity: 0
      }

      to {
        transform: translateX(0) scale(1);
        opacity: 1
      }
    }

    /* Mobile Navigation */
    .mobile-nav {
      display: none
    }

    /* 📱 Responsive Design */
    @media (max-width: 1024px) {
      .sidebar {
        width: 88px;
        padding: 32px 14px
      }

      .sidebar-name,
      .nav-item span {
        display: none
      }

      .nav-item {
        justify-content: center;
        padding: 16px
      }

      .sidebar-brand {
        justify-content: center;
        padding: 0
      }
    }

    @media (max-width: 768px) {
      .admin-layout {
        flex-direction: column
      }

      .sidebar {
        display: none
      }

      .topbar {
        padding: 0 20px;
        height: 64px
      }

      .content {
        padding: 20px 16px 100px
      }

      .stat-grid {
        grid-template-columns: 1fr;
        gap: 16px
      }

      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
        padding: 12px 16px 24px;
        justify-content: space-around;
        z-index: 400;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05)
      }

      .m-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        color: var(--muted);
        text-decoration: none;
        font-size: 10px;
        font-weight: 700;
        border: none;
        background: none;
        font-family: inherit
      }

      .m-nav-item svg {
        width: 22px;
        height: 22px;
        stroke-width: 2
      }

      .m-nav-item.active {
        color: var(--brand)
      }

      .card-section {
        padding: 24px;
        border-radius: 20px
      }

      .page-title {
        font-size: 18px
      }

      .topbar #authArea {
        display: none
      }

      /* Hide user area on mobile topbar, maybe move to profile tab */
    }

    /* Notifications */
    .notif-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      border: 1px solid var(--stroke);
      border-radius: 24px;
      margin-bottom: 16px;
      background: var(--card);
      transition: all .2s ease;
      box-shadow: var(--shadow)
    }

    .notif-item:hover {
      border-color: var(--brand);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px)
    }

    .notif-item .n-body {
      flex: 1;
      min-width: 0
    }

    .notif-item .n-title {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 4px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .notif-item .n-msg {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .notif-item .n-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 16px;
      align-items: center;
      font-weight: 600;
      flex-wrap: wrap
    }

    .notif-item .n-actions {
      flex-shrink: 0
    }

    .badge-sm {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px
    }

    .b-blue {
      background: var(--brand-soft);
      color: var(--brand)
    }

    .b-green {
      background: var(--green-bg);
      color: var(--green)
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3
    }

    /* Admin Calendar Grid Styles */
    .calendar-admin-wrapper {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 20px;
      box-shadow: var(--shadow);
    }
    .weekdays-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg);
      border-bottom: 1px solid var(--stroke);
    }
    .weekday-label {
      padding: 14px;
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .admin-days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(110px, 1fr);
    }
    .admin-day {
      border-right: 1px solid var(--stroke);
      border-bottom: 1px solid var(--stroke);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.2s ease;
    }
    .admin-day:nth-child(7n) { border-right: none; }
    .admin-day.off-month { background: var(--bg); opacity: 0.4; }
    .admin-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .admin-day-num {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      border-radius: 50%;
    }
    .admin-day.today .admin-day-num {
      background: var(--brand);
      color: #fff;
    }
    .admin-event-bar {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.2s;
    }
    .admin-event-bar:hover {
      background: var(--brand);
      color: #fff;
      transform: translateX(2px);
    }
    .add-event-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--brand);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      transition: opacity 0.2s;
    }
    .admin-day:hover .add-event-btn { opacity: 1; }
  </style>
</head>

<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div id="adminGate" style="display:none">
    <div class="admin-layout">
      <!-- SIDEBAR INJECTED GLOBALLY BY shared_auth.js -->

      <!-- MAIN CONTENT -->
      <main class="main" style="flex: 1; display: flex; flex-direction: column;">
        <header class="topbar">
          <div class="page-header">
            <h2 class="page-title" id="pageTitle">Users Management</h2>
          </div>
          <div id="authArea"></div>
        </header>

        <div class="content">
          <!-- STATS SECTION -->
          <div class="stat-grid" id="statsGrid"></div>

          <!-- USERS PANEL -->
          <div class="panel active" id="panel-users">
            <div class="panel-header" style="justify-content:space-between;gap:20px;flex-wrap:wrap">
              <div class="search-container" style="flex:1;min-width:300px">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" id="userSearch" class="search-input"
                  placeholder="Search by name, email, city, state..." oninput="filterUsers()">
              </div>
              <div style="display:flex;gap:12px;align-items:center">
                <select id="csvFilter" class="form-control" style="width:140px;height:44px;font-size:13px;border-radius:12px">
                  <option value="all">All Time</option>
                  <option value="today">Today</option>
                  <option value="week">Past Week</option>
                  <option value="month">Past Month</option>
                </select>
                <button class="btn btn-primary" onclick="downloadUsersCSV()" style="height:44px;white-space:nowrap;display:flex;align-items:center">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Export CSV
                </button>
              </div>
            </div>
            <div class="table-container">
              <div class="table-scroll">
                <table>
                  <thead>
                    <tr>
                      <th>User Details</th>
                      <th>Phone Number</th>
                      <th>Location</th>
                      <th>Joined</th>
                      <th style="text-align:right">Action</th>
                    </tr>
                  </thead>
                  <tbody id="usersTbody">
                    <tr>
                      <td colspan="5" class="empty">Loading dashboard...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- SEND NOTIFICATION PANEL -->
          <div class="panel" id="panel-notifSend">
            <div class="card-section">
              <h3>Compose Notification</h3>
              <div class="form-group">
                <label class="form-label">Recipient Target</label>
                <select id="nTarget" class="form-control" onchange="toggleCustomEmail()">
                  <option value="all">Broadcast to All Users</option>
                  <option value="custom">Specific User (via Email)</option>
                </select>
              </div>
              <div class="form-group" id="nEmailWrap" style="display:none">
                <label class="form-label">Recipient Email</label>
                <input type="email" id="nEmail" class="form-control" placeholder="user@example.com">
              </div>
              <div class="form-group">
                <label class="form-label">Notification Title</label>
                <input type="text" id="nTitle" class="form-control" placeholder="Brief headline">
              </div>
              <div class="form-group">
                <label class="form-label">Message Content</label>
                <textarea id="nMessage" class="form-control" placeholder="Enter notification message..."></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">CTA Link (Optional)</label>
                <input type="text" id="nLink" class="form-control" placeholder="https://example.com">
              </div>
              <button class="btn btn-primary" id="sendNotifBtn" onclick="sendNotification()" style="width:100%">
                Dispatch Notification
              </button>
            </div>
          </div>

          <!-- NOTIFICATION HISTORY PANEL -->
          <div class="panel" id="panel-notifHistory">
            <div id="adminNotifList">
              <div class="empty">Scanning history...</div>
            </div>
          </div>

          <!-- CALENDAR PANEL -->
          <div class="panel" id="panel-calendar">
            <div class="panel-header">
              <div class="calendar-controls">
                <button class="btn btn-outline" onclick="setToday()">Today</button>
                <div style="display:flex;gap:4px">
                  <button class="btn btn-outline" style="padding:8px" onclick="prevMonth()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                  </button>
                  <button class="btn btn-outline" style="padding:8px" onclick="nextMonth()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                </div>
                <div class="month-display" id="monthDisplay" style="font-family:'Lexend';font-weight:700;font-size:18px;min-width:160px"></div>
              </div>
              <button class="btn btn-primary" onclick="openEventModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Add Event
              </button>
            </div>
            
            <div class="calendar-admin-wrapper">
              <div class="weekdays-grid">
                <div class="weekday-label">Sun</div>
                <div class="weekday-label">Mon</div>
                <div class="weekday-label">Tue</div>
                <div class="weekday-label">Wed</div>
                <div class="weekday-label">Thu</div>
                <div class="weekday-label">Fri</div>
                <div class="weekday-label">Sat</div>
              </div>
              <div class="admin-days-grid" id="adminDaysGrid">
                <!-- Days injected here -->
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- ADD/EDIT EVENT MODAL -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal-card">
      <h3 id="eventModalTitle">Add New Event</h3>
      <div class="form-group">
        <label class="form-label">Event Title</label>
        <input type="text" id="evTitle" class="form-control" placeholder="e.g., JEE Main 2026 Registration">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="evDesc" class="form-control" placeholder="Detailed information about the event..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="evDate" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Time (Optional)</label>
          <input type="time" id="evTime" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">CTA Link (Optional)</label>
        <input type="text" id="evLink" class="form-control" placeholder="https://example.com/apply">
      </div>
       <div class="form-group" style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <input type="checkbox" id="evNotify" style="width:18px;height:18px;accent-color:var(--brand)">
        <label for="evNotify" style="font-weight:600;font-size:14px;cursor:pointer">Send broadcast notification now</label>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <input type="checkbox" id="evReminder" style="width:18px;height:18px;accent-color:var(--brand)" onchange="document.getElementById('reminderConfig').style.display=this.checked?'block':'none'">
        <label for="evReminder" style="font-weight:600;font-size:14px;cursor:pointer">Schedule automatic reminder</label>
      </div>
      <div id="reminderConfig" style="display:none;margin-left:28px;margin-bottom:16px">
        <label class="form-label" style="font-size:12px">Reminder Time</label>
        <select id="evReminderOffset" class="form-control" style="padding:8px">
          <option value="10">10 minutes before</option>
          <option value="30">30 minutes before</option>
          <option value="60">1 hour before</option>
          <option value="1440">1 day before</option>
        </select>
      </div>
      <div class="modal-actions" style="display:flex;gap:12px;justify-content:flex-end;margin-top:32px">
        <button class="btn btn-outline" onclick="closeEventModal()">Cancel</button>
        <button class="btn btn-primary" id="saveEventBtn" onclick="saveEvent()">Save Event</button>
      </div>
    </div>

  <!-- EDIT USER MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-card">
      <h3>Edit User Profile</h3>
      <div id="editFields"></div>
      <div class="modal-actions" style="display:flex;gap:12px;justify-content:flex-end;margin-top:32px">
        <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" id="saveEditBtn" onclick="saveUserEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';

    var allUsers = [];
    var allNotifs = [];
    var allEvents = [];
    var editingUser = null;
    var editingEvent = null;
    var currentCalDate = new Date();

    // ── Init ──
    (function () {
      initAuth();
      var session = getSession();
      if (!session || session.role !== 'admin') {
        document.body.innerHTML = '<div style="text-align:center;padding:100px 20px"><h2 style="font-family:Lexend;font-weight:800;margin-bottom:12px;color:var(--brand)">Access Denied</h2><p style="color:var(--muted)">Admin privileges required. <a href="index.html">Return Home</a></p></div>';
        return;
      }
      document.getElementById('adminGate').style.display = 'block';
      
      // Inject Admin Tabs into Global Sidebar
      injectAdminNav();

      loadUsers();
      loadNotifications();
      loadEvents();
    })();

    function injectAdminNav() {
      var nav = document.querySelector('#sidebar nav'); if (!nav) return;
      var html = `
        <div class="sidebar-label" style="color:var(--brand)">Admin Controls</div>
        <a href="#" class="sidebar-link admin-tab-btn active" data-tab="users" onclick="switchPanel('users', this);closeSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Users Database</a>
        <a href="#" class="sidebar-link admin-tab-btn" data-tab="notifSend" onclick="switchPanel('notifSend', this);closeSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Send Alert</a>
        <a href="#" class="sidebar-link admin-tab-btn" data-tab="notifHistory" onclick="switchPanel('notifHistory', this);closeSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Alert History</a>
        <a href="#" class="sidebar-link admin-tab-btn" data-tab="calendar" onclick="switchPanel('calendar', this);closeSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Manage Events</a>
      `;
      nav.insertAdjacentHTML('beforeend', html);
    }

    // ── Toast ──
    function toast(msg, type) {
      var w = document.getElementById('toastWrap'); if (!w) return;
      var el = document.createElement('div'); el.className = 'toast';
      var c = type === 'ok' ? 'var(--green)' : type === 'err' ? 'var(--red)' : 'var(--blue)';
      el.innerHTML = '<span class="toast-dot" style="background:' + c + '"></span><span>' + escAuth(msg) + '</span>';
      w.appendChild(el);
      setTimeout(function () { el.style.opacity = '0'; el.style.transform = 'translateX(110%)'; el.style.transition = 'all .3s'; setTimeout(function () { el.remove() }, 350) }, 3500);
    }

    // ── Tabs ──
    function switchPanel(id, btn) {
      if (btn && btn.tagName === 'A') event.preventDefault();
      
      document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active') });
      document.querySelectorAll('.admin-tab-btn').forEach(function (b) { b.classList.remove('active') });

      document.getElementById('panel-' + id).classList.add('active');

      if (btn) btn.classList.add('active');
      else {
        var target = document.querySelector('.admin-tab-btn[data-tab="' + id + '"]');
        if (target) target.classList.add('active');
      }

      var titles = {
        'users': 'Users Management',
        'notifSend': 'Compose Notification',
        'notifHistory': 'Notification History',
        'calendar': 'Calendar Management'
      };
      document.getElementById('pageTitle').textContent = titles[id] || 'Admin Panel';
      
      // Auto-refresh data when switching tabs
      if (id === 'notifHistory') loadNotifications();
      if (id === 'users') loadUsers();
      if (id === 'calendar') loadEvents();
    }

    // ── USERS ──
    async function loadUsers() {
      var tb = document.getElementById('usersTbody');
      var res = await authApi('getUsers', {});
      if (res.ok) {
        allUsers = res.data || [];
        renderStats();
        renderUsers(allUsers);
      } else {
        tb.innerHTML = '<tr><td colspan="5" class="empty">Error: ' + escAuth(res.error) + '</td></tr>';
      }
    }

    function renderStats() {
      try {
        var grid = document.getElementById('statsGrid');
        if (!grid) return;
        var states = {};
        var now = new Date();
        var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        var weekStart = now.getTime() - (7 * 24 * 60 * 60 * 1000);
        var monthStart = now.getTime() - (30 * 24 * 60 * 60 * 1000);

        var regToday = 0, regWeek = 0, regMonth = 0;
        allUsers.forEach(function (u) {
          if (u.state) states[u.state] = (states[u.state] || 0) + 1;
          var dt = u.createdAt ? (u.createdAt.toDate ? u.createdAt.toDate() : new Date(u.createdAt)) : null;
          if (!dt) return;
          var ts = dt.getTime();
          if (ts >= todayStart) regToday++;
          if (ts >= weekStart) regWeek++;
          if (ts >= monthStart) regMonth++;
        });

        grid.innerHTML = 
          '<div class="stat-card">' +
          '<div class="stat-icon users"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>' +
          '<div class="stat-info"><div class="val">' + allUsers.length + '</div><div class="lbl">Total Users</div><div style="font-size:11px;color:var(--muted);margin-top:4px">+' + regToday + ' Today / +' + regWeek + ' Week</div></div>' +
          '</div>' +
          '<div class="stat-card">' +
          '<div class="stat-icon states"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>' +
          '<div class="stat-info"><div class="val">' + Object.keys(states).length + '</div><div class="lbl">States Covered</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Top: ' + (Object.keys(states)[0] || 'N/A') + '</div></div>' +
          '</div>' +
          '<div class="stat-card">' +
          '<div class="stat-icon notifs"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>' +
          '<div class="stat-info"><div class="val">' + (allNotifs ? allNotifs.length : 0) + '</div><div class="lbl">Alerts History</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Past Month: ' + regMonth + ' Regs</div></div>' +
          '</div>';
      } catch (e) {
        console.error('renderStats error:', e);
      }
    }

    function downloadUsersCSV() {
      var filter = document.getElementById('csvFilter').value;
      var now = new Date();
      var cutoff = 0;
      if (filter === 'today') cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      else if (filter === 'week') cutoff = now.getTime() - (7 * 24 * 60 * 60 * 1000);
      else if (filter === 'month') cutoff = now.getTime() - (30 * 24 * 60 * 60 * 1000);

      var filtered = allUsers.filter(function(u) {
        if (filter === 'all') return true;
        var dt = u.createdAt ? (u.createdAt.toDate ? u.createdAt.toDate() : new Date(u.createdAt)) : null;
        return dt && dt.getTime() >= cutoff;
      });

      if (!filtered.length) return toast('No users found for this range.', 'err');

      var headers = ['Name', 'Email', 'Phone', 'State', 'City', 'Joined Date'];
      var rows = filtered.map(function(u) {
        var dt = u.createdAt ? (u.createdAt.toDate ? u.createdAt.toDate() : new Date(u.createdAt)) : new Date();
        return [
          '"' + (u.name || '').replace(/"/g, '""') + '"',
          '"' + (u.email || '').replace(/"/g, '""') + '"',
          '"' + (u.phone || '').replace(/"/g, '""') + '"',
          '"' + (u.state || '').replace(/"/g, '""') + '"',
          '"' + (u.city || '').replace(/"/g, '""') + '"',
          '"' + dt.toISOString().split('T')[0] + '"'
        ].join(',');
      });

      var csvContent = 'data:text/csv;charset=utf-8,' + headers.join(',') + '\n' + rows.join('\n');
      var encodedUri = encodeURI(csvContent);
      var link = document.createElement('a');
      link.setAttribute('href', encodedUri);
      link.setAttribute('download', 'college_simplified_users_' + filter + '_' + new Date().toISOString().split('T')[0] + '.csv');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      toast('CSV Exported: ' + filtered.length + ' users', 'ok');
    }

    function renderUsers(list) {
      var tb = document.getElementById('usersTbody');
      if (!list.length) { tb.innerHTML = '<tr><td colspan="5" class="empty"><div class="empty-icon">👥</div>No users found.</td></tr>'; return; }
      
      tb.innerHTML = list.map(function (u, i) {
        var initial = (u.name || 'U').charAt(0).toUpperCase();
        var dt = u.createdAt ? (u.createdAt.toDate ? u.createdAt.toDate() : new Date(u.createdAt)) : null;
        var dateStr = dt && !isNaN(dt.getTime()) ? dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : 'Pending';

        return '<tr>' +
          '<td>' +
          '<div class="user-cell">' +
          '<div class="user-avatar" style="background:var(--brand-soft);color:var(--brand);box-shadow:none;border:1px solid var(--brand-ring)">' + initial + '</div>' +
          '<div>' +
          '<div style="font-weight:800;color:var(--ink);font-size:15px">' + escAuth(u.name) + '</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + escAuth(u.email) + '</div>' +
          '</div>' +
          '</div>' +
          '</td>' +
          '<td><div style="font-weight:600;color:var(--ink2)">' + escAuth(u.phone || '-') + '</div></td>' +
          '<td>' +
          '<div style="font-weight:700;color:var(--ink)">' + escAuth(u.state || '-') + '</div>' +
          '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + escAuth(u.city || '-') + '</div>' +
          '</td>' +
          '<td><div style="font-weight:600;color:var(--ink2);font-size:13px">' + dateStr + '</div></td>' +
          '<td style="text-align:right">' +
          '<button class="btn btn-outline" style="padding:10px 20px;font-size:12px;border-radius:14px" onclick="openEditModal(' + allUsers.indexOf(u) + ')">Edit Profile</button>' +
          '</td>' +
          '</tr>';
      }).join('');
    }

    function filterUsers() {
      var q = (document.getElementById('userSearch').value || '').toLowerCase();
      if (!q) { renderUsers(allUsers); return; }
      var filtered = allUsers.filter(function (u) {
        return (u.name || '').toLowerCase().includes(q) ||
          (u.email || '').toLowerCase().includes(q) ||
          (u.state || '').toLowerCase().includes(q) ||
          (u.city || '').toLowerCase().includes(q) ||
          (u.phone || '').toLowerCase().includes(q);
      });
      renderUsers(filtered);
    }

    // ── Edit Modal ──
    function openEditModal(idx) {
      editingUser = allUsers[idx];
      var fields = ['name', 'email', 'phone', 'state', 'city'];
      var html = fields.map(function (f) {
        return '<div class="form-group"><label class="form-label">' + f.charAt(0).toUpperCase() + f.slice(1) + '</label><input type="text" class="form-control" id="edit_' + f + '" value="' + escAuth(editingUser[f] || '') + '"></div>';
      }).join('');
      document.getElementById('editFields').innerHTML = html;
      document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      editingUser = null;
    }

    async function saveUserEdit() {
      if (!editingUser) return;
      var payload = { id: editingUser.id };
      ['name', 'email', 'phone', 'state', 'city'].forEach(function (f) {
        var el = document.getElementById('edit_' + f);
        if (el) payload[f] = el.value.trim();
      });
      var btn = document.getElementById('saveEditBtn');
      btn.disabled = true; btn.textContent = 'Saving...';
      var res = await authApi('updateUser', payload);
      btn.disabled = false; btn.textContent = 'Save Changes';
      if (res.ok) {
        toast('User updated successfully!', 'ok');
        closeEditModal();
        loadUsers();
      } else {
        toast('Error: ' + (res.error || 'Failed to save'), 'err');
      }
    }

    // ── NOTIFICATIONS ──
    function toggleCustomEmail() {
      var v = document.getElementById('nTarget').value;
      document.getElementById('nEmailWrap').style.display = v === 'custom' ? 'block' : 'none';
    }

    async function sendNotification() {
      var target = document.getElementById('nTarget').value;
      if (target === 'custom') {
        target = (document.getElementById('nEmail').value || '').trim();
        if (!target) return toast('Please enter a user email.', 'err');
      }
      var title = (document.getElementById('nTitle').value || '').trim();
      var message = (document.getElementById('nMessage').value || '').trim();
      var link = (document.getElementById('nLink').value || '').trim();
      if (!title) return toast('Title is required.', 'err');
      if (!message) return toast('Message is required.', 'err');

      var session = getSession();
      var btn = document.getElementById('sendNotifBtn');
      btn.disabled = true; btn.textContent = 'Sending...';

      var res = await authApi('sendNotification', {
        target: target, title: title, message: message, link: link,
        senderName: session ? session.name : 'Admin'
      });
      btn.disabled = false; btn.textContent = 'Send Notification';

      if (res.ok) {
        toast('Notification sent!', 'ok');
        document.getElementById('nTitle').value = '';
        document.getElementById('nMessage').value = '';
        document.getElementById('nLink').value = '';
        loadNotifications();
      } else {
        toast('Error: ' + (res.error || 'Failed'), 'err');
      }
    }

    async function loadNotifications() {
      try {
        console.log('Fetching notifications...');
        var res = await authApi('getAllNotifications', {});
        if (res.ok) {
          allNotifs = res.data || [];
          console.log('Fetched:', allNotifs.length, 'notifs');
          renderStats();
          renderNotifications();
        } else {
          console.error('Fetch failed:', res.error);
          toast('Error: ' + (res.error || 'Failed to load history'), 'err');
          var listEl = document.getElementById('adminNotifList');
          if (listEl) listEl.innerHTML = '<div class="empty">Failed to load history.</div>';
        }
      } catch (e) {
        console.error('loadNotifications catch:', e);
        var listEl = document.getElementById('adminNotifList');
        if (listEl) listEl.innerHTML = '<div class="empty">System error during fetch.</div>';
      }
    }

    function renderNotifications() {
      var el = document.getElementById('adminNotifList');
      if (!el) {
        console.error('adminNotifList element not found!');
        return;
      }
      if (!allNotifs || !allNotifs.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🔔</div>No notifications sent yet.</div>'; return; }
      
      try {
        el.innerHTML = allNotifs.map(function (n) {
          var targetLabel = n.target === 'all' ? '<span class="badge-sm b-blue">All Users</span>' : '<span class="badge-sm b-green">' + escAuth(n.target) + '</span>';
          var linkHtml = n.link ? '<a href="' + escAuth(n.link) + '" target="_blank" style="color:var(--blue);font-weight:600;text-decoration:none;font-size:12px">View Link →</a>' : '';
          
          var dateStr = 'TBA';
          if (n.createdAt) {
            var dt = n.createdAt.toDate ? n.createdAt.toDate() : new Date(n.createdAt);
            dateStr = dt.toLocaleString();
          }
          
          var schedLabel = '';
          if (n.scheduledAt) {
            var isPast = new Date(n.scheduledAt) <= new Date();
            schedLabel = '<span class="badge-sm ' + (isPast?'b-green':'b-blue') + '" style="margin-left:8px">' + (isPast?'Delivered':'Scheduled: ' + new Date(n.scheduledAt).toLocaleString()) + '</span>';
          }

          return '<div class="notif-item">' +
            '<div class="n-body">' +
            '<div class="n-title" style="display:flex;align-items:center;gap:8px">' + escAuth(n.title) + schedLabel + '</div>' +
            '<div class="n-msg">' + escAuth(n.message) + '</div>' +
            '<div class="n-meta">' + targetLabel + '<span>' + dateStr + '</span>' + linkHtml + '</div>' +
            '</div>' +
            '<div class="n-actions">' +
            '<button class="btn btn-danger" style="padding:8px 14px;font-size:11px" onclick="deleteNotification(\'' + n.id + '\')">Delete</button>' +
            '</div>' +
            '</div>';
        }).join('');
      } catch (e) {
        console.error('Render error:', e);
        el.innerHTML = '<div class="empty">Error rendering history. Check console.</div>';
      }
    }

    async function deleteNotification(id) {
      if (!confirm('Delete this notification?')) return;
      var res = await authApi('deleteNotification', { id: id });
      if (res.ok) { toast('Notification deleted.', 'ok'); loadNotifications(); }
      else { toast('Error: ' + res.error, 'err'); }
    }

    // ── CALENDAR ──
    async function loadEvents() {
      var res = await authApi('getEvents', {});
      if (res.ok) {
        allEvents = res.data || [];
        renderCalendar();
      } else {
        toast('Failed to load events', 'err');
      }
    }

    function renderCalendar() {
      var year = currentCalDate.getFullYear();
      var month = currentCalDate.getMonth();
      
      var display = document.getElementById('monthDisplay');
      if (display) display.textContent = currentCalDate.toLocaleString('default', { month: 'long', year: 'numeric' });

      var firstDay = new Date(year, month, 1).getDay();
      var lastDay = new Date(year, month + 1, 0).getDate();
      var prevLastDay = new Date(year, month, 0).getDate();
      
      var grid = document.getElementById('adminDaysGrid');
      if (!grid) return;
      grid.innerHTML = '';

      var today = new Date();
      var isTodayMonth = today.getFullYear() === year && today.getMonth() === month;

      // Fill previous month days
      for (var x = firstDay; x > 0; x--) {
        grid.appendChild(createAdminDayEl(prevLastDay - x + 1, true));
      }

      // Fill current month days
      for (var i = 1; i <= lastDay; i++) {
        var isToday = isTodayMonth && today.getDate() === i;
        var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(i).padStart(2, '0');
        var dayEvents = allEvents.filter(function(e) { return e.date === dateStr; });
        grid.appendChild(createAdminDayEl(i, false, isToday, dayEvents, dateStr));
      }

      // Fill next month days
      var totalCells = grid.children.length;
      var remaining = 42 - totalCells;
      for (var j = 1; j <= remaining; j++) {
        grid.appendChild(createAdminDayEl(j, true));
      }
    }

    function createAdminDayEl(num, isOffMonth, isToday, events, dateStr) {
      var div = document.createElement('div');
      div.className = 'admin-day' + (isOffMonth ? ' off-month' : '') + (isToday ? ' today' : '');

      var header = document.createElement('div');
      header.className = 'admin-day-header';
      
      var numSpan = document.createElement('span');
      numSpan.className = 'admin-day-num';
      numSpan.textContent = num;
      header.appendChild(numSpan);

      if (!isOffMonth) {
        var addBtn = document.createElement('button');
        addBtn.className = 'add-event-btn';
        addBtn.innerHTML = '+';
        addBtn.onclick = function() { openEventModal(undefined, dateStr); };
        header.appendChild(addBtn);
      }

      div.appendChild(header);

      if (events) {
        events.forEach(function(ev) {
          var evDiv = document.createElement('div');
          evDiv.className = 'admin-event-bar';
          evDiv.textContent = ev.title;
          evDiv.onclick = function(e) {
            e.stopPropagation();
            openEventModal(allEvents.indexOf(ev));
          };
          div.appendChild(evDiv);
        });
      }
      return div;
    }

    function prevMonth() { currentCalDate.setMonth(currentCalDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { currentCalDate.setMonth(currentCalDate.getMonth() + 1); renderCalendar(); }
    function setToday() { currentCalDate = new Date(); renderCalendar(); }

    function openEventModal(idx, dateStr) {
      editingEvent = idx !== undefined ? allEvents[idx] : null;
      document.getElementById('eventModalTitle').textContent = editingEvent ? 'Edit Event' : 'Add New Event';
      document.getElementById('evTitle').value = editingEvent ? editingEvent.title : '';
      document.getElementById('evDesc').value = editingEvent ? editingEvent.desc : '';
      document.getElementById('evDate').value = editingEvent ? editingEvent.date : (dateStr || '');
      document.getElementById('evTime').value = editingEvent ? editingEvent.time : '';
      document.getElementById('evLink').value = editingEvent ? editingEvent.link : '';
      document.getElementById('evNotify').checked = false;
      document.getElementById('evReminder').checked = false;
      document.getElementById('reminderConfig').style.display = 'none';
      document.getElementById('evNotify').parentElement.style.display = editingEvent ? 'none' : 'flex';
      
      // Add delete button if editing
      var footer = document.querySelector('#eventModal .modal-actions');
      var delBtn = document.getElementById('modalDelBtn');
      if (editingEvent) {
        if (!delBtn) {
          delBtn = document.createElement('button');
          delBtn.id = 'modalDelBtn';
          delBtn.className = 'btn btn-danger';
          delBtn.style.marginRight = 'auto';
          delBtn.textContent = 'Delete';
          delBtn.onclick = function() { deleteEvent(editingEvent.id); closeEventModal(); };
          footer.prepend(delBtn);
        }
      } else {
        if (delBtn) delBtn.remove();
      }

      document.getElementById('eventModal').classList.add('show');
    }

    function closeEventModal() {
      document.getElementById('eventModal').classList.remove('show');
      editingEvent = null;
    }

    async function saveEvent() {
      var title = document.getElementById('evTitle').value.trim();
      var desc = document.getElementById('evDesc').value.trim();
      var date = document.getElementById('evDate').value;
      var time = document.getElementById('evTime').value;
      var link = document.getElementById('evLink').value.trim();
      var notify = document.getElementById('evNotify').checked;

      if (!title || !date) return toast('Title and Date are required.', 'err');

      var payload = {
        title: title, desc: desc, date: date, time: time, link: link
      };

      if (editingEvent) {
        payload.id = editingEvent.id;
      }

      var btn = document.getElementById('saveEventBtn');
      btn.disabled = true; btn.textContent = 'Saving...';

      var action = editingEvent ? 'updateEvent' : 'addEvent';
      var res = await authApi(action, payload);

      if (res.ok) {
        if (notify) {
          await authApi('sendNotification', {
            target: 'all',
            title: 'Event: ' + title,
            message: (desc || '') + ' | Date: ' + date + ' Time: ' + (time || 'TBA'),
            link: link
          });
        }
        if (document.getElementById('evReminder').checked && date && time) {
          var offset = parseInt(document.getElementById('evReminderOffset').value);
          var eventDT = new Date(date + 'T' + time);
          var schedDT = new Date(eventDT.getTime() - (offset * 60000));
          await authApi('sendNotification', {
            target: 'all',
            title: 'Reminder: ' + title,
            message: 'Starting in ' + offset + ' mins! Date: ' + date + ' Time: ' + time,
            link: link,
            scheduledAt: schedDT.toISOString()
          });
        }
        closeEventModal();
        loadEvents();
      } else {
        toast('Error: ' + (res.error || 'Failed to save'), 'err');
      }
      btn.disabled = false; btn.textContent = 'Save Event';
    }

    async function deleteEvent(id) {
      if (!confirm('Delete this event permanently?')) return;
      var res = await authApi('deleteEvent', { id: id });
      if (res.ok) {
        toast('Event deleted.', 'ok');
        loadEvents();
      } else {
        toast('Error: ' + (res.error || 'Failed'), 'err');
      }
    }
  </script>
</body>
