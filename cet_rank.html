<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHT-CET — Percentile to Rank Predictor — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626;
      --brand-soft: #fef2f2;
      --ink: #111827;
      --muted: #6b7280;
      --bg: #f4f6fb;
      --card: #ffffff;
      --stroke: #e5e7eb;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding-top: 64px;
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .page-hero {
      background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 32px;
      color: #fff;
      box-shadow: 0 10px 30px rgba(220, 38, 38, 0.2);
    }

    .page-hero h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .page-hero p {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
      margin: 16px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    label:first-child {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--stroke);
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-soft);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      margin-top: 24px;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.15);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(220, 38, 38, 0.25);
    }

    .result-card {
      display: none;
      margin-top: 24px;
      background: #fff;
      border: 1.5px solid var(--stroke);
      border-radius: 24px;
      padding: 24px;
      animation: fadeUp 0.4s ease;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
    }

    .result-card.show {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    .res-box {
      background: var(--bg);
      border: 2px solid var(--stroke);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .res-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .res-box.primary {
      border-color: var(--brand);
      background: var(--brand-soft);
    }

    .res-box.tentative {
      border-color: #0f172a;
      background: #f8fafc;
    }

    .res-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .res-val {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
    }

    .res-box.primary .res-val {
      color: var(--brand);
    }

    .res-box.tentative .res-val {
      color: #0f172a;
    }

    .res-sub {
      font-size: 13px;
      color: var(--ink2);
      margin-top: 12px;
      font-weight: 600;
      line-height: 1.6;
      text-align: center;
    }

    .variation-note {
      background: #fffbeb;
      border: 1px solid #fef3c7;
      color: #92400e;
      padding: 16px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 24px;
      line-height: 1.5;
      text-align: left;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    @media (max-width: 480px) {
      .results-grid {
        grid-template-columns: 1fr;
      }

      .res-val {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="toolArea">
      <div class="page-hero">
        <h1>Percentile vs Rank</h1>
        <p>Estimate your state-level rank based on your MHT-CET percentile and historical candidate data.</p>
      </div>

      <div class="card">
        <label>Your CET Percentile</label>
        <input type="number" id="inPercentile" placeholder="e.g. 96.50" step="0.01" min="0" max="100">

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-top: 16px;">
          <button class="btn" onclick="calcRank()">Calculate Rank</button>
          <button class="btn" onclick="resetForm()" style="background: var(--bg); color: var(--ink); border: 1.5px solid var(--stroke);">Reset</button>
        </div>
      </div>

      <div class="result-card" id="resultCard">
        <div class="results-grid">
          <div class="res-box primary">
            <div class="res-label">Results based on data upto 2025</div>
            <div class="res-val" id="resRank">—</div>
          </div>
          <div class="res-box tentative">
            <div class="res-label">Results expected in 2026</div>
            <div class="res-val" id="resRankTentative">—</div>
          </div>
        </div>

        <div class="variation-note">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            style="flex-shrink:0; margin-top:2px;">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <p>This year mhtcet consists of two attempts, there may be a high variation in percentile to rank this year
          </p>
        </div>

        <div class="res-sub" id="resSub"></div>
        <button class="btn" onclick="goToPredictor()" style="background:#0f172a; margin-top:32px;">
          Predict My Colleges
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            style="vertical-align:middle; margin-left:8px;">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';

    function calcRank() {
      var pct = parseFloat(document.getElementById('inPercentile').value);
      if (isNaN(pct) || pct < 0 || pct > 100) return alert('Enter a valid percentile (0-100)');

      var total = 520000;
      var rank = Math.max(1, Math.round((100 - pct) / 100 * total));
      var rankTentative = Math.max(1, Math.round(rank * 0.9));

      document.getElementById('resRank').textContent = rank.toLocaleString('en-IN');
      document.getElementById('resRankTentative').textContent = rankTentative.toLocaleString('en-IN');

      var tier = '';
      if (rank <= 1000) tier = 'Top Tier — Dream colleges like COEP, VJTI and SPIT are highly likely.';
      else if (rank <= 5000) tier = 'Excellent — High chances for premium branches in top-tier colleges.';
      else if (rank <= 15000) tier = 'Very Good — Strong options across reputed government and private institutes.';
      else tier = 'Good — Multiple quality options available across the state.';

      document.getElementById('resSub').textContent = tier;
      document.getElementById('resultCard').classList.add('show');
      window.lastCalculatedRank = rank;
    }

    function goToPredictor() {
      if (window.lastCalculatedRank) {
        window.location.href = `mht_cet_college_predictor.html?rank=${window.lastCalculatedRank}`;
      }
    }

    function resetForm() {
      document.getElementById('inPercentile').value = '';
      document.getElementById('resultCard').classList.remove('show');
      window.lastCalculatedRank = null;
    }

    function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;

      // Handle URL params
      var params = new URLSearchParams(window.location.search);
      var pct = params.get('percentile');
      if (pct) {
        document.getElementById('inPercentile').value = pct;
        calcRank();
      }
    }

    window.calcRank = calcRank;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>

</html>
