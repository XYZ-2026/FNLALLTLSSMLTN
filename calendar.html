<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626;
      --brand-soft: #fef2f2;
      --brand-ring: rgba(220, 38, 38, 0.1);
      --ink: #111827;
      --ink2: #374151;
      --muted: #6b7280;
      --bg: #fafafa;
      --card: #ffffff;
      --stroke: #e5e7eb;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      --grid-border: #f3f4f6;
    }

    [data-theme="dark"] {
      --ink: #f9fafb;
      --ink2: #e5e7eb;
      --muted: #9ca3af;
      --bg: #030712;
      --card: #111827;
      --stroke: #1f2937;
      --grid-border: #1f2937;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px; /* Space for global header */
    }

    .calendar-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 4px;
    }
    
    header.app-bar { display: none; } /* Hide the redundant local header */

    .calendar-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .month-display {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 20px;
      min-width: 180px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--ink2);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-icon:hover { background: var(--brand-soft); color: var(--brand); }

    .btn-today {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--stroke);
      background: var(--card);
      color: var(--ink);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-today:hover { background: var(--bg); }

    /* Calendar Grid */
    @media (max-width: 640px) {
      .calendar-main { padding: 4px; width: 100%; overflow-x: hidden; }
      .calendar-header-bar { margin-bottom: 12px; padding: 0 8px; flex-wrap: wrap; gap: 12px; }
      .month-display { font-size: 16px; min-width: auto; flex: 1; order: 1; text-align: center; }
      .calendar-controls { gap: 8px; width: 100%; justify-content: center; order: 2; }
      .weekdays, .days-grid { grid-template-columns: repeat(7, minmax(0, 1fr)); width: 100%; }
      .weekday { font-size: 8px; padding: 6px 0; }
      .day { min-height: 55px; padding: 2px; }
      .day-num { width: 18px; height: 18px; font-size: 10px; }
      .event-item { font-size: 7px; padding: 1px 2px; margin-bottom: 1px; border-radius: 2px; }
    }
    
    @media (max-width: 420px) {
      .weekday span { display: none; }
      .weekday::after { content: attr(title); font-size: 10px; font-weight: 800; display: block; text-align: center; }
      .weekday[title="Sunday"]::after { content: "S"; }
      .weekday[title="Monday"]::after { content: "M"; }
      .weekday[title="Tuesday"]::after { content: "T"; }
      .weekday[title="Wednesday"]::after { content: "W"; }
      .weekday[title="Thursday"]::after { content: "T"; }
      .weekday[title="Friday"]::after { content: "F"; }
      .weekday[title="Saturday"]::after { content: "S"; }
    }
    
    .calendar-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .calendar-wrapper {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg);
      border-bottom: 1px solid var(--stroke);
    }

    .weekday {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(120px, 1fr);
    }

    .day {
      border-right: 1px solid var(--grid-border);
      border-bottom: 1px solid var(--grid-border);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 120px;
      transition: background 0.2s;
    }

    .day:nth-child(7n) { border-right: none; }

    .day.off-month {
      background: var(--bg);
      opacity: 0.5;
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .day-num {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      font-weight: 600;
      font-size: 14px;
      border-radius: 50%;
    }

    .day.today .day-num {
      background: var(--brand);
      color: #fff;
    }

    .event-item {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .event-item:hover {
      transform: scale(1.02);
      background: var(--brand);
      color: #fff;
    }

    /* Modal for Event Details */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .event-modal {
      background: var(--card);
      border-radius: 20px;
      width: 100%;
      max-width: 450px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalPop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-hdr {
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .modal-meta {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .modal-desc {
      color: var(--ink2);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn-cta {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: #fff;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .btn-cta:hover { opacity: 0.9; }

    @media (max-width: 1024px) {
      .day { min-height: 100px; }
    }

    @media (max-width: 768px) {
      .calendar-main { padding: 12px; }
      .days-grid { grid-auto-rows: minmax(80px, 1fr); }
      .day { padding: 4px; }
      .day-num { width: 24px; height: 24px; font-size: 12px; }
      .event-item { font-size: 10px; padding: 2px 4px; }
      .month-display { font-size: 16px; min-width: 140px; }
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <main class="calendar-main">
    <div class="calendar-header-bar">
      <div class="calendar-controls">
        <button class="btn-today" onclick="setToday()">Today</button>
        <div style="display:flex;gap:4px">
          <button class="btn-icon" onclick="prevMonth()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="btn-icon" onclick="nextMonth()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="month-display" id="monthDisplay">May 2026</div>
      </div>
      <div id="authArea" class="desktop-only"></div>
    </div>
    <div class="calendar-wrapper">
      <div class="weekdays">
        <div class="weekday" title="Sunday"><span>Sun</span></div>
        <div class="weekday" title="Monday"><span>Mon</span></div>
        <div class="weekday" title="Tuesday"><span>Tue</span></div>
        <div class="weekday" title="Wednesday"><span>Wed</span></div>
        <div class="weekday" title="Thursday"><span>Thu</span></div>
        <div class="weekday" title="Friday"><span>Fri</span></div>
        <div class="weekday" title="Saturday"><span>Sat</span></div>
      </div>
      <div class="days-grid" id="daysGrid">
        <!-- Days will be injected here -->
      </div>
    </div>
  </main>

  <!-- EVENT DETAILS MODAL -->
  <div class="modal-overlay" id="eventDetailModal" onclick="closeModal(event)">
    <div class="event-modal" onclick="event.stopPropagation()">
      <div class="modal-hdr">
        <div class="modal-title" id="mdTitle">Event Title</div>
        <div class="modal-meta">
          <span id="mdDate">May 15, 2026</span>
          <span id="mdTime">10:00 AM</span>
        </div>
      </div>
      <div class="modal-desc" id="mdDesc">
        Detailed information about the event goes here.
      </div>
      <a href="#" id="mdLink" target="_blank" class="btn-cta">View More Details</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    let currentDate = new Date();
    let allEvents = [];

    async function init() {
      initAuth();
      await fetchEvents();
      renderCalendar();
    }

    function toggleCap(btn) {
      btn.classList.toggle('active');
      btn.nextElementSibling.classList.toggle('active');
    }

    async function fetchEvents() {
      const res = await authApi('getEvents', {});
      if (res.ok) allEvents = res.data || [];
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      const monthDisplay = document.getElementById('monthDisplay');
      monthDisplay.textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();
      const prevLastDay = new Date(year, month, 0).getDate();
      
      const grid = document.getElementById('daysGrid');
      grid.innerHTML = '';

      const today = new Date();
      const isTodayMonth = today.getFullYear() === year && today.getMonth() === month;

      // Previous month days
      for (let x = firstDay; x > 0; x--) {
        const d = prevLastDay - x + 1;
        grid.appendChild(createDayEl(d, true));
      }

      // Current month days
      for (let i = 1; i <= lastDay; i++) {
        const isToday = isTodayMonth && today.getDate() === i;
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const dayEvents = allEvents.filter(e => e.date === dateStr);
        grid.appendChild(createDayEl(i, false, isToday, dayEvents));
      }

      // Next month days
      const totalCells = grid.children.length;
      const remaining = 42 - totalCells; // 6 rows * 7 days
      for (let j = 1; j <= remaining; j++) {
        grid.appendChild(createDayEl(j, true));
      }
    }

    function createDayEl(num, isOffMonth, isToday, events = []) {
      const div = document.createElement('div');
      div.className = `day ${isOffMonth ? 'off-month' : ''} ${isToday ? 'today' : ''}`;
      
      const header = document.createElement('div');
      header.className = 'day-header';
      header.innerHTML = `<span class="day-num">${num}</span>`;
      div.appendChild(header);

      events.forEach(ev => {
        const evDiv = document.createElement('div');
        evDiv.className = 'event-item';
        evDiv.textContent = ev.title;
        evDiv.onclick = (e) => {
          e.stopPropagation();
          showEventDetails(ev);
        };
        div.appendChild(evDiv);
      });

      return div;
    }

    function showEventDetails(ev) {
      document.getElementById('mdTitle').textContent = ev.title;
      document.getElementById('mdDesc').textContent = ev.desc || 'No description provided.';
      document.getElementById('mdDate').textContent = ev.date;
      document.getElementById('mdTime').textContent = ev.time || 'All Day';
      
      const link = document.getElementById('mdLink');
      if (ev.link) {
        link.href = ev.link;
        link.style.display = 'block';
      } else {
        link.style.display = 'none';
      }
      
      document.getElementById('eventDetailModal').classList.add('show');
    }

    function closeModal(e) {
      document.getElementById('eventDetailModal').classList.remove('show');
    }

    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
    function setToday() { currentDate = new Date(); renderCalendar(); }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
