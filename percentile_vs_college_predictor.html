<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHT-CET College Predictor — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626; --brand-d: #991b1b; --brand-soft: #fef2f2; --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #0f172a; --ink2: #475569; --muted: #94a3b8; --bg: #f8fafc; --card: #ffffff; --stroke: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding-top: 80px; }
    
    .wrap { max-width: 800px; margin: 0 auto; padding: 40px 24px 100px; }
    
    .page-hero { 
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%); 
      border-radius: 32px; padding: 48px 40px; margin-bottom: 40px; color: #fff; 
      box-shadow: 0 20px 40px var(--brand-ring); position: relative; overflow: hidden;
    }
    .page-hero h1 { font-family: 'Lexend', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; position: relative; }
    .page-hero p { font-size: 16px; opacity: 0.9; line-height: 1.6; max-width: 520px; position: relative; }

    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; color: var(--ink2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    
    input, select { 
      width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--stroke); border-radius: 16px; 
      font-family: inherit; font-size: 15px; font-weight: 500; outline: none; transition: all 0.2s; background: var(--bg);
    }
    input:focus, select:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 5px var(--brand-ring); }

    .btn { 
      width: 100%; padding: 18px; background: linear-gradient(135deg, var(--brand), var(--brand-d)); color: #fff; border: none; border-radius: 20px; 
      font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; transition: 0.3s; 
      box-shadow: 0 10px 25px var(--brand-ring); display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--brand-ring); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .greeting { background: var(--brand-soft); color: var(--brand); padding: 16px 20px; border-radius: 16px; margin-bottom: 24px; font-size: 14px; font-weight: 700; border: 1px solid var(--brand-ring); display: none; }
    
    .loader-wrap { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 12px; justify-content: center; }
    .spinner { width: 18px; height: 18px; border: 3px solid var(--stroke); border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .branch-trigger { 
      width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--stroke); border-radius: 16px; 
      font-size: 15px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
      background: var(--bg); transition: 0.2s;
    }
    .branch-trigger:hover { border-color: var(--muted); }
    
    .branch-panel { 
      display: none; position: absolute; z-index: 1000; background: #fff; border: 1px solid var(--stroke); 
      border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); max-height: 400px; overflow-y: auto; width: 100%; margin-top: 8px; 
    }
    .branch-panel.open { display: block; }
    
    .panel-hdr { padding: 12px 20px; background: var(--bg); font-weight: 800; font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; border-bottom: 1px solid var(--stroke); }
    
    .branch-option { padding: 12px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--bg); transition: 0.2s; }
    .branch-option:hover { background: var(--bg); }
    .branch-option.selected { background: var(--brand-soft); color: var(--brand); font-weight: 700; }

    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .chip { background: var(--brand-soft); color: var(--brand); padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid var(--brand-ring); }
    .chip-remove { cursor: pointer; font-size: 16px; opacity: 0.6; }
    .chip-remove:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div id="helloBanner" class="greeting"></div>
      
      <div class="page-hero">
        <h1>College Predictor</h1>
        <p>Find the best engineering colleges matching your MHT-CET or JEE percentile based on historical seat allotment data.</p>
      </div>

      <div class="card">
        <div class="form-group">
          <label class="form-label">Exam Type</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            <select id="examType">
              <option value="MHT-CET">MHT-CET (Maharashtra State)</option>
              <option value="JEE">JEE Mains (All India Quota)</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Your Percentile</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <input type="number" id="inPercentile" placeholder="e.g. 97.45" step="0.0001" min="0" max="100">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Candidate Category</label>
          <div class="input-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <select id="inCategory">
              <option value="OPEN">OPEN / General</option>
              <option value="OBC">OBC</option>
              <option value="SC">SC</option>
              <option value="ST">ST</option>
              <option value="VJ/DT">VJ / DT / NT-A</option>
              <option value="NT1">NT-B</option>
              <option value="NT2">NT-C</option>
              <option value="NT3">NT-D</option>
              <option value="EWS">EWS</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Preferred Branches</label>
          <div style="position:relative">
            <div class="branch-trigger" id="branchTrigger">
              <svg style="position:absolute; left:18px" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              <span id="triggerText" style="margin-left:30px">All Branches Selected</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="branch-panel" id="branchPanel"></div>
          </div>
          <div class="chips-row" id="branchChips"></div>
        </div>

        <button class="btn" id="predictBtn" onclick="predict()" disabled>
          Generate Preference List
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <div id="dataLoader" class="loader-wrap">
          <div class="spinner"></div>
          <span>Synchronizing seat matrix...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';
    let allData = [];

    function predict() {
      const pctVal = document.getElementById('inPercentile').value;
      const pct = parseFloat(pctVal);
      if (!pctVal || isNaN(pct)) return alert('Enter a valid percentile');
      const exam = document.getElementById('examType').value;
      const cat = document.getElementById('inCategory').value;

      if (!allData.length) return alert("Data is loading, please wait...");

      let filtered = allData.filter(r => r.exam === (exam === 'JEE' ? 'JEE' : 'MHT-CET'));
      
      filtered = filtered.filter(r => r.percentile <= pct).sort((a,b) => b.percentile - a.percentile);

      if (exam === 'MHT-CET') {
        const catMap = {
          'VJ/DT': 'VJ',
          'NT1': 'NT1',
          'NT2': 'NT2',
          'NT3': 'NT3',
          'OBC': 'OBC',
          'SC': 'SC',
          'ST': 'ST',
          'EWS': 'EWS',
          'OPEN': 'OPEN'
        };
        const searchKey = catMap[cat] || cat;
        filtered = filtered.filter(r => (r.seatType||'').includes(searchKey));
      } else {
        // For JEE, typically All India (AI) seats are used
        // We only filter if specific AI reserved seats exist, otherwise show all AI
        const hasReservedAI = filtered.some(r => (r.seatType||'').includes(cat));
        if (hasReservedAI) {
          filtered = filtered.filter(r => (r.seatType||'').includes(cat));
        } else {
          filtered = filtered.filter(r => (r.seatType||'').includes('AI') || (r.seatType||'').includes('OPEN'));
        }
      }

      if (!selectedBranches.has('__all__')) {
        filtered = filtered.filter(r => selectedBranches.has(r.branch.trim()));
      }

      localStorage.setItem("results", JSON.stringify(filtered.slice(0, 80)));
      window.location.href = "results.html";
    }

    let selectedBranches = new Set(['__all__']);
    let allBranchNames = [];

    const COMPUTER_KEYWORDS = ['COMPUTER', 'INFORMATION TECHNOLOGY', 'AI', 'ARTIFICIAL', 'DATA SCIENCE', 'MACHINE LEARNING', 'SOFTWARE', 'CYBER', 'ROBOTICS', 'CS', 'IT'];
    const CORE_KEYWORDS = ['MECHANICAL', 'CIVIL', 'ELECTRICAL', 'CHEMICAL', 'PRODUCTION', 'METALLURGY', 'AUTOMOBILE', 'TEXTILE'];
    const ELECTRONICS_KEYWORDS = ['ELECTRONICS', 'TELECOMMUNICATION', 'ENTC', 'COMMUNICATION', 'INSTRUMENTATION'];
    const BIOTECH_KEYWORDS = ['BIOTECHNOLOGY', 'BIO-MEDICAL', 'BIO MEDICAL', 'FOOD', 'AGRICULTURE', 'PHARMACEUTICAL'];

    function renderBranchPanel() {
      const panel = document.getElementById('branchPanel');
      let html = `<div class="panel-hdr" style="display:flex; justify-content:space-between; align-items:center">
        <span>Quick Select</span>
        <span onclick="clearAllBranches()" style="color:var(--brand); cursor:pointer; font-size:10px; text-decoration:underline">Clear All</span>
      </div>`;
      html += `<div class="branch-option ${selectedBranches.has('__all__')?'selected':''}" onclick="toggleBranch('__all__')">
        <div style="flex:1">
          <div style="font-weight:700">All Branches</div>
          <div style="font-size:11px; opacity:0.7">Include every available engineering stream</div>
        </div>
      </div>`;
      html += `<div class="branch-option" onclick="toggleCluster('COMPUTER')">
        <div style="flex:1">
          <div style="font-weight:700">All Computer-related</div>
          <div style="font-size:11px; opacity:0.7">CS, IT, AI, Data Science, Machine Learning, etc.</div>
        </div>
      </div>`;
      html += `<div class="branch-option" onclick="toggleCluster('ELECTRONICS')">
        <div style="flex:1">
          <div style="font-weight:700">Electronics & ENTC</div>
          <div style="font-size:11px; opacity:0.7">ENTC, Electronics, Telecomm, Instrumentation, etc.</div>
        </div>
      </div>`;
      html += `<div class="branch-option" onclick="toggleCluster('CORE')">
        <div style="flex:1">
          <div style="font-weight:700">All Core-engineering</div>
          <div style="font-size:11px; opacity:0.7">Mech, Civil, Electrical, Chem, Production, etc.</div>
        </div>
      </div>`;
      html += `<div class="branch-option" onclick="toggleCluster('BIOTECH')">
        <div style="flex:1">
          <div style="font-weight:700">Biotech & Life Sciences</div>
          <div style="font-size:11px; opacity:0.7">Biotechnology, Bio-medical, Food, Agriculture, etc.</div>
        </div>
      </div>`;
      
      html += `<div class="panel-hdr">Individual Branches</div>`;
      allBranchNames.forEach(b => {
        html += `<div class="branch-option ${selectedBranches.has(b)?'selected':''}" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">${b}</div>`;
      });
      panel.innerHTML = html;
      renderChips();
    }

    function clearAllBranches() {
      selectedBranches.clear();
      selectedBranches.add('__all__');
      renderBranchPanel();
    }

    function toggleBranch(b) {
      if (b === '__all__') { selectedBranches.clear(); selectedBranches.add('__all__'); }
      else { 
        selectedBranches.delete('__all__'); 
        if (selectedBranches.has(b)) selectedBranches.delete(b); 
        else selectedBranches.add(b); 
      }
      if (selectedBranches.size === 0) selectedBranches.add('__all__');
      renderBranchPanel();
    }

    function toggleCluster(type) {
      selectedBranches.delete('__all__');
      let keywords = [];
      if (type === 'COMPUTER') keywords = COMPUTER_KEYWORDS;
      else if (type === 'CORE') keywords = CORE_KEYWORDS;
      else if (type === 'ELECTRONICS') keywords = ELECTRONICS_KEYWORDS;
      else if (type === 'BIOTECH') keywords = BIOTECH_KEYWORDS;
      
      allBranchNames.forEach(b => {
        const branchUpper = b.toUpperCase();
        const match = keywords.some(k => {
          // Use regex with word boundaries for short keywords or specific matches
          const escaped = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const regex = new RegExp(`\\b${escaped}\\b|${escaped}(?=[^A-Z])|(?<=[^A-Z])${escaped}`, 'i');
          return regex.test(branchUpper);
        });
        if (match) selectedBranches.add(b);
      });
      renderBranchPanel();
    }

    function renderChips() {
      const row = document.getElementById('branchChips');
      if (!row) return;
      row.innerHTML = '';
      selectedBranches.forEach(b => {
        row.innerHTML += `<span class="chip">${b === '__all__' ? 'All Branches' : b} <span class="chip-remove" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">×</span></span>`;
      });
      document.getElementById('triggerText').textContent = selectedBranches.has('__all__') ? 'All Branches' : `${selectedBranches.size} Branches Selected`;
    }

    async function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;
      
      const banner = document.getElementById('helloBanner');
      const loaderTxt = document.querySelector('#dataLoader span');
      const user = getSession();
      if (user && banner) { 
        banner.textContent = `Hi ${user.name}, let's analyze your chances for the best engineering colleges.`; 
        banner.style.display = 'block'; 
      }

      let mhtData = [], jeeData = [];

      try {
        loaderTxt.textContent = "Loading MHT-CET data (12MB)...";
        const r1 = await fetch('data.json');
        const j1 = await r1.json();
        const raw1 = Array.isArray(j1) ? j1 : (j1["MHT-CET College Data"] || j1[Object.keys(j1)[0]] || []);
        mhtData = raw1.map(r => ({
          exam: 'MHT-CET',
          code: r["Institute Code"] || r["College Code"],
          name: r["Institute"] || r["Institute Name"],
          branch: r["Branch"] || r["Branch Name"],
          percentile: parseFloat(r["Percentile"] || r["MHT-CET Percentile"] || 0),
          seatType: r["Seat Type"],
          url: r["College Url"] || '#'
        }));
        console.log("MHT-CET Loaded:", mhtData.length);
      } catch(e) { console.error("MHT Load Fail:", e); }

      try {
        loaderTxt.textContent = "Synchronizing JEE data...";
        const r2 = await fetch('jee_data.json');
        const j2 = await r2.json();
        const raw2 = Array.isArray(j2) ? j2 : (j2[Object.keys(j2)[0]] || []);
        jeeData = raw2.map(r => ({
          exam: 'JEE',
          code: r["College Code"] || r["Institute Code"],
          name: r["Institute Name"] || r["Institute"],
          branch: r["Branch Name"] || r["Branch"],
          percentile: parseFloat(r["JEE Percentile"] || r["Percentile"] || 0),
          seatType: r["Seat Type"] || 'AI',
          url: r["College Url"] || '#'
        }));
        console.log("JEE Loaded:", jeeData.length);
      } catch(e) { console.error("JEE Load Fail:", e); }

      allData = mhtData.concat(jeeData);
      
      if (allData.length > 0) {
        const bSet = new Set();
        allData.forEach(r => { if(r.branch) bSet.add(r.branch.trim()); });
        allBranchNames = Array.from(bSet).sort();
        renderBranchPanel();

        document.getElementById('predictBtn').disabled = false;
        document.getElementById('dataLoader').style.display = 'none';
      } else {
        document.getElementById('dataLoader').innerHTML = '<span style="color:var(--brand)">Failed to load data matrix. Please refresh.</span>';
      }

      document.getElementById('branchTrigger').onclick = () => document.getElementById('branchPanel').classList.toggle('open');
      document.addEventListener('click', e => { 
        const trigger = document.getElementById('branchTrigger');
        const panel = document.getElementById('branchPanel');
        if (!trigger || !panel) return;
        if (!e.target.closest('#branchTrigger') && !e.target.closest('#branchPanel')) panel.classList.remove('open'); 
      });
    }

    window.predict = predict;
    window.toggleBranch = toggleBranch;
    window.toggleCluster = toggleCluster;
    window.clearAllBranches = clearAllBranches;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
