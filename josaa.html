<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOSAA College Predictor — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626; --brand-d: #991b1b; --brand-soft: #fef2f2; --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #0f172a; --ink2: #475569; --muted: #94a3b8; --bg: #f8fafc; --card: #ffffff; --stroke: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding-top: 80px; }
    
    .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 24px 100px; }
    
    .page-hero { 
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%); 
      border-radius: 32px; padding: 48px 40px; margin-bottom: 40px; color: #fff; 
      box-shadow: 0 20px 40px var(--brand-ring); position: relative; overflow: hidden;
    }
    .page-hero h1 { font-family: 'Lexend', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; position: relative; }
    .page-hero p { font-size: 16px; opacity: 0.9; line-height: 1.6; max-width: 580px; position: relative; }

    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); max-width: 800px; margin: 0 auto; }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; color: var(--ink2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    
    input, select { 
      width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--stroke); border-radius: 16px; 
      font-family: inherit; font-size: 15px; font-weight: 500; outline: none; transition: all 0.2s; background: var(--bg);
    }
    input:focus, select:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 5px var(--brand-ring); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .btn { 
      width: 100%; padding: 18px; background: linear-gradient(135deg, var(--brand), var(--brand-d)); color: #fff; border: none; border-radius: 20px; 
      font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; transition: 0.3s; 
      box-shadow: 0 10px 25px var(--brand-ring); display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--brand-ring); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .loader-wrap { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; font-weight: 600; margin-top: 12px; justify-content: center; }
    .spinner { width: 18px; height: 18px; border: 3px solid var(--stroke); border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-table { width: 100%; border-collapse: collapse; margin-top: 24px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-lg); border: 1px solid var(--stroke); }
    .results-table th { background: var(--bg); padding: 16px 20px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--stroke); }
    .results-table td { padding: 16px 20px; font-size: 13px; border-bottom: 1px solid var(--stroke); }
    .results-table tr:last-child td { border-bottom: none; }

    .type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-top: 12px; }
    .type-pill { 
      padding: 12px; border: 2px solid var(--stroke); border-radius: 16px; font-size: 13px; font-weight: 700; text-align: center; cursor: pointer; transition: 0.2s; background: var(--bg); display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .type-pill:hover { border-color: var(--muted); }
    .type-pill.active { background: var(--brand-soft); border-color: var(--brand); color: var(--brand); }
    .type-pill input { display: none; }

    .table-scroll-wrap { overflow-x: auto; border-radius: 20px; }
    @media (min-width: 1025px) {
      .table-scroll-wrap { overflow-x: visible; }
    }

    /* Multi-step & Branch Styles */
    .steps { display: flex; justify-content: center; gap: 40px; margin-bottom: 32px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; opacity: 0.4; transition: 0.3s; }
    .step.active { opacity: 1; }
    .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--stroke); color: var(--ink); display: grid; place-items: center; font-weight: 800; font-size: 14px; }
    .step.active .step-num { background: var(--brand); color: #fff; box-shadow: 0 0 0 4px var(--brand-ring); }
    .step-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .branch-cats{display:flex;flex-direction:column;gap:12px}
    .branch-cat{border:1px solid var(--stroke);border-radius:18px;overflow:hidden;background:var(--card)}
    .branch-cat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);cursor:pointer;border-bottom:1px solid var(--stroke);transition:background 0.2s; gap: 8px; flex-wrap: wrap; }
    .branch-cat-head:hover{background:#eef2ff}
    .branch-cat-name{font-weight:800;font-size:14px;display:flex;align-items:center;gap:10px; color: var(--ink); flex: 1; min-width: 140px; }
    .branch-cat-name svg{color:var(--muted);flex-shrink:0}
    .branch-cat-count{font-size:11px;color:var(--muted);font-weight:600;background:var(--bg);padding:2px 8px;border-radius:100px;border:1px solid var(--stroke); white-space: nowrap; }
    .branch-cat-toggle{font-size:11px;font-weight:700;color:var(--brand);cursor:pointer;background:var(--brand-soft);padding:5px 12px;border-radius:100px;border:none;font-family:inherit;transition:0.2s; white-space: nowrap; }
    .branch-cat-toggle:hover{background:var(--brand);color:#fff}
    .branch-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:4px;padding:12px}
    .branch-opt{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;font-size:11px;font-weight:600;color:var(--ink2);border:1.5px solid transparent}
    .branch-opt:hover{background:var(--bg);border-color:var(--stroke)}
    .branch-opt.selected{background:var(--brand-soft);border-color:var(--brand-ring);color:var(--brand)}
    .branch-chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--stroke);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:10px}
    .branch-opt.selected .branch-chk{background:var(--brand);border-color:var(--brand);color:#fff}
    .branch-select-all{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--brand-soft);border:1px solid var(--brand-ring);border-radius:14px;margin-bottom:16px;cursor:pointer;transition:0.2s;font-weight:700;font-size:13px;color:var(--brand)}
    .branch-select-all:hover{background:#fde2e2}
    
    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .chip { background: var(--brand-soft); color: var(--brand); padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid var(--brand-ring); }
    .chip-remove { cursor: pointer; font-size: 16px; opacity: 0.6; }
    .chip-remove:hover { opacity: 1; }
    .btn-ghost { background: transparent; border: 2px solid var(--stroke); color: var(--muted); box-shadow: none; }
    .btn-ghost:hover { border-color: var(--ink2); color: var(--ink); }

    @media (max-width: 600px) {
      .wrap { padding: 20px 16px; }
      .card { padding: 24px 16px; border-radius: 24px; }
      .steps { gap: 20px; margin-bottom: 24px; }
      .step-lbl { font-size: 10px; }
      .branch-cat-head { padding: 12px; }
      .branch-cat-name { font-size: 13px; }
      .branch-cat-toggle { font-size: 10px; padding: 4px 10px; }
      .btn { padding: 14px; font-size: 14px; border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div class="page-hero">
        <h1>JOSAA Predictor</h1>
        <p>Expert college prediction for NITs, IIITs, and GFTIs based on your JEE Mains rank and preferences.</p>
      </div>

      <div class="card">
        <div class="steps">
          <div class="step active" id="step1">
            <div class="step-num">1</div>
            <div class="step-lbl">Profile</div>
          </div>
          <div class="step" id="step2">
            <div class="step-num">2</div>
            <div class="step-lbl">Branches</div>
          </div>
        </div>

        <!-- STEP 1: PROFILE -->
        <div class="panel active" id="panel1">
          <div class="form-group">
            <label class="form-label">All India Rank (JEE Mains)</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <input type="number" id="inRank" placeholder="e.g. 15400" required>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Category</label>
              <div class="input-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <select id="inCategory">
                  <option value="OPEN">OPEN</option>
                  <option value="OBC-NCL">OBC-NCL</option>
                  <option value="SC">SC</option>
                  <option value="ST">ST</option>
                  <option value="EWS">EWS</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Gender Pool</label>
              <div class="input-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/><path d="M9 10a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0z"/><path d="M12 13v3"/><path d="M10 16h4"/></svg>
                <select id="inGender">
                  <option value="Gender-Neutral">Gender-Neutral</option>
                  <option value="Female-only (including Supernumerary)">Female-only</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Seat Quota</label>
              <div class="input-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <select id="inQuota">
                  <option value="">All Quotas</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Preferred Institute Types</label>
            <div class="type-grid">
              <label class="type-pill active" id="pill-NIT">
                <input type="checkbox" name="instType" value="National Institute of Technology" checked onchange="togglePill(this)"> NIT
              </label>
              <label class="type-pill active" id="pill-IIIT">
                <input type="checkbox" name="instType" value="Indian Institute of Information Technology" checked onchange="togglePill(this)"> IIIT
              </label>
              <label class="type-pill" id="pill-GFTI">
                <input type="checkbox" name="instType" value="Other Central Government" onchange="togglePill(this)"> GFTI
              </label>
            </div>
          </div>

          <button class="btn" onclick="goStep(2)">
            Continue to Branch Selection
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>

        <!-- STEP 2: BRANCHES -->
        <div class="panel" id="panel2">
          <div class="form-group">
            <label class="form-label">Select Preferred Branches</label>
            <div class="branch-panel" id="branchPanel"></div>
            <div class="chips-row" id="branchChips"></div>
          </div>
          <div style="display:flex; gap:12px; margin-top:24px">
            <button class="btn btn-ghost" onclick="goStep(1)" style="flex:1">Back</button>
            <button class="btn" id="predictBtn" onclick="handlePredict()" disabled style="flex:2">
              Generate Predictor Results
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>

        <div id="dataLoader" class="loader-wrap">
          <div class="spinner"></div>
          <span>Synchronizing JoSAA seat matrix...</span>
        </div>
      </div>

      <div id="resultsSection" class="results-section" style="display:none; margin-top:60px">
        <h2 style="font-family:'Lexend'; font-size:20px; font-weight:800; margin-bottom:20px">Detailed Institute Allotments</h2>
        <div class="table-scroll-wrap">
          <table class="results-table">
            <thead>
              <tr>
                <th>Institute</th>
                <th>Program</th>
                <th>Quota</th>
                <th>Category</th>
                <th>Gender</th>
                <th>Opening</th>
                <th>Closing</th>
              </tr>
            </thead>
            <tbody id="resultsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';
    let josaaData = [];
    let selectedBranches = new Set();
    let allBranchNames = [];
    let expandedCats = new Set();

    const CATS = {
      'Computer & IT': ['COMPUTER', 'INFORMATION TECHNOLOGY', 'AI', 'ARTIFICIAL', 'DATA SCIENCE', 'MACHINE LEARNING', 'SOFTWARE', 'CYBER', 'ROBOTICS'],
      'Electronics & Telecom': ['ELECTRONICS', 'TELECOMMUNICATION', 'ENTC', 'COMMUNICATION', 'INSTRUMENTATION'],
      'Core Engineering': ['MECHANICAL', 'CIVIL', 'ELECTRICAL', 'CHEMICAL', 'PRODUCTION', 'METALLURGY', 'AUTOMOBILE', 'TEXTILE', 'MINING'],
      'Biotech & Allied': ['BIOTECHNOLOGY', 'BIO-MEDICAL', 'BIO MEDICAL', 'FOOD', 'AGRICULTURE', 'PHARMACEUTICAL'],
      'Other Branches': []
    };

    function categorizeBranch(b) {
      const u = b.toUpperCase();
      for (const [cat, kws] of Object.entries(CATS)) {
        if (cat === 'Other Branches') continue;
        if (kws.some(k => { const re = new RegExp('\\b' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'); return re.test(u) })) return cat;
      }
      return 'Other Branches';
    }

    function renderBranchPanel() {
      const panel = document.getElementById('branchPanel');
      const grouped = {};
      Object.keys(CATS).forEach(c => grouped[c] = []);
      allBranchNames.forEach(b => { const cat = categorizeBranch(b); grouped[cat].push(b) });

      let html = `<div class="branch-select-all" onclick="toggleAllBranches()">
        <div class="branch-chk" id="chkAll">${selectedBranches.size === allBranchNames.length ? '✓' : ''}</div> 
        Select All Branches (${allBranchNames.length})
      </div>`;

      html += '<div class="branch-cats">';
      Object.entries(grouped).forEach(([cat, branches]) => {
        if (!branches.length) return;
        const selInCat = branches.filter(b => selectedBranches.has(b)).length;
        const isAllInCat = selInCat === branches.length;
        const isExpanded = expandedCats.has(cat);

        html += `<div class="branch-cat">
          <div class="branch-cat-head" onclick="toggleCatCollapse('${cat.replace(/'/g, "\\'")}')">
            <div class="branch-cat-name">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              ${cat}
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="branch-cat-count">${selInCat}/${branches.length}</span>
              <button class="branch-cat-toggle" onclick="event.stopPropagation();toggleCategory('${cat.replace(/'/g, "\\'")}')">
                ${isAllInCat ? 'Deselect' : 'Select All'}
              </button>
            </div>
          </div>
          <div class="branch-list" style="display:${isExpanded ? 'grid' : 'none'}">`;
        
        branches.forEach(b => {
          const sel = selectedBranches.has(b) ? 'selected' : '';
          html += `<div class="branch-opt ${sel}" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">
            <div class="branch-chk">${sel ? '✓' : ''}</div>
            <span>${b}</span>
          </div>`;
        });
        
        html += '</div></div>';
      });
      html += '</div>';
      panel.innerHTML = html;
      renderChips();
    }

    function toggleCatCollapse(cat) {
      if (expandedCats.has(cat)) expandedCats.delete(cat);
      else expandedCats.add(cat);
      renderBranchPanel();
    }

    function toggleBranch(b) {
      if (selectedBranches.has(b)) selectedBranches.delete(b);
      else selectedBranches.add(b);
      renderBranchPanel();
    }

    function toggleCategory(cat) {
      const grouped = {};
      Object.keys(CATS).forEach(c => grouped[c] = []);
      allBranchNames.forEach(b => { grouped[categorizeBranch(b)].push(b) });
      const branches = grouped[cat] || [];
      const allSel = branches.every(b => selectedBranches.has(b));
      branches.forEach(b => { if (allSel) selectedBranches.delete(b); else selectedBranches.add(b) });
      renderBranchPanel();
    }

    function toggleAllBranches() {
      if (selectedBranches.size === allBranchNames.length) { selectedBranches.clear() }
      else { allBranchNames.forEach(b => selectedBranches.add(b)) }
      renderBranchPanel();
    }

    function renderChips() {
      const row = document.getElementById('branchChips');
      if (!row) return;
      row.innerHTML = '';
      if (selectedBranches.size > 0) {
        row.innerHTML = `<span class="chip">${selectedBranches.size} branches selected</span>`;
        if (selectedBranches.size <= 3) {
          row.innerHTML = Array.from(selectedBranches).map(b => `<span class="chip">${b.split('(')[0]} <span class="chip-remove" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">×</span></span>`).join('');
        }
      }
    }

    function goStep(n) {
      if (n === 2) {
        const rank = document.getElementById('inRank').value;
        if (!rank || isNaN(parseInt(rank))) return alert('Please enter your JEE Mains rank first');
      }
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const targetPanel = document.getElementById('panel' + n);
      if (targetPanel) targetPanel.classList.add('active');
      document.querySelectorAll('.step').forEach((s, i) => {
        if (i + 1 <= n) s.classList.add('active');
        else s.classList.remove('active');
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handlePredict(e) {
      if (e) e.preventDefault();
      const rank = parseInt(document.getElementById('inRank').value);
      const cat = document.getElementById('inCategory').value;
      const gen = document.getElementById('inGender').value;
      const quota = document.getElementById('inQuota').value;
      
      const selectedTypes = Array.from(document.querySelectorAll('input[name="instType"]:checked')).map(i => i.value);
      
      if (!josaaData.length) return alert("Data is still loading...");

      let filtered = josaaData.filter(r => 
        r["Seat Type"] === cat && 
        r.Gender === gen && 
        parseInt(r["Closing Rank"]) >= rank
      );

      // Quota Filter
      if (quota) {
        filtered = filtered.filter(r => r.Quota === quota);
      }

      // Institute Type Filter
      if (selectedTypes.length > 0) {
        filtered = filtered.filter(r => selectedTypes.some(t => r.Institute.includes(t)));
      }

      // Branch Filter
      if (selectedBranches.size > 0) {
        filtered = filtered.filter(r => selectedBranches.has(r["Academic Program Name"]));
      }

      filtered.sort((a,b) => parseInt(a["Closing Rank"]) - parseInt(b["Closing Rank"]));
      
      const tbody = document.getElementById('resultsTableBody');
      tbody.innerHTML = filtered.slice(0, 150).map(r => `
        <tr>
          <td style="font-weight:700; min-width:200px">${r.Institute}</td>
          <td style="color:var(--ink2); min-width:200px">${r["Academic Program Name"]}</td>
          <td style="font-weight:600">${r.Quota}</td>
          <td style="font-weight:600">${r["Seat Type"]}</td>
          <td style="font-size:12px">${r.Gender}</td>
          <td style="font-weight:700; color:var(--muted)">${r["Opening Rank"]}</td>
          <td style="font-weight:800; color:var(--brand)">${r["Closing Rank"]}</td>
        </tr>
      `).join('');

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--muted)">No institutes found matching your rank and category.</td></tr>';
      }

      document.getElementById('resultsSection').style.display = 'block';
      window.scrollTo({top: document.getElementById('resultsSection').offsetTop - 60, behavior: 'smooth'});
    }

    function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;
      fetch('josaa.json').then(r => r.json()).then(json => {
        josaaData = json["JOSAA DATA"] || json["JOSAA_Round_6_Cutoffs"] || [];
        
        // Extract unique branches
        const bSet = new Set();
        const qSet = new Set();
        josaaData.forEach(r => { 
          if(r["Academic Program Name"]) bSet.add(r["Academic Program Name"].trim());
          if(r.Quota) qSet.add(r.Quota.trim());
        });
        allBranchNames = Array.from(bSet).sort();
        renderBranchPanel();

        // Populate Quota dropdown
        const qSelect = document.getElementById('inQuota');
        Array.from(qSet).sort().forEach(q => {
          const opt = document.createElement('option');
          opt.value = q;
          opt.textContent = q;
          qSelect.appendChild(opt);
        });

        document.getElementById('predictBtn').disabled = false;
        document.getElementById('dataLoader').style.display = 'none';

        const params = new URLSearchParams(window.location.search);
        const urlRank = params.get('rank');
        if (urlRank) {
          document.getElementById('inRank').value = urlRank;
        }
      }).catch(err => {
        console.error("Data load fail:", err);
        document.getElementById('dataLoader').innerHTML = '<span style="color:var(--brand)">Sync failed. Please refresh.</span>';
      });
    }

    window.handlePredict = handlePredict;
    window.goStep = goStep;
    window.toggleBranch = toggleBranch;
    window.toggleCategory = toggleCategory;
    window.toggleAllBranches = toggleAllBranches;
    window.toggleCatCollapse = toggleCatCollapse;

    function togglePill(input) {
      const pill = input.parentElement;
      if (input.checked) pill.classList.add('active');
      else pill.classList.remove('active');
    }
    window.togglePill = togglePill;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
