<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHT CET College Predictor — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626; --brand-d: #991b1b; --brand-soft: #fef2f2; --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #0f172a; --ink2: #475569; --muted: #94a3b8; --bg: #f8fafc; --card: #ffffff; --stroke: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding-top: 80px; }
    
    .wrap { max-width: 800px; margin: 0 auto; padding: 40px 24px 100px; }
    
    .page-hero { 
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%); 
      border-radius: 32px; padding: 48px 40px; margin-bottom: 40px; color: #fff; 
      box-shadow: 0 20px 40px var(--brand-ring); position: relative; overflow: hidden;
    }
    .page-hero h1 { font-family: 'Lexend', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; position: relative; }
    .page-hero p { font-size: 16px; opacity: 0.9; line-height: 1.6; max-width: 520px; position: relative; }

    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 32px; padding: 40px; box-shadow: var(--shadow-lg); }
    
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; color: var(--ink2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    
    input, select { 
      width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--stroke); border-radius: 16px; 
      font-family: inherit; font-size: 15px; font-weight: 500; outline: none; transition: all 0.2s; background: var(--bg);
    }
    input:focus, select:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 5px var(--brand-ring); }

    .btn { 
      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--brand), var(--brand-d)); color: #fff; border: none; border-radius: 16px; 
      font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; 
      box-shadow: 0 10px 25px var(--brand-ring); display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--brand-ring); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-ghost { background: transparent; border: 2px solid var(--stroke); color: var(--muted); box-shadow: none; }
    .btn-ghost:hover { border-color: var(--ink2); color: var(--ink); }

    .steps { display: flex; justify-content: center; gap: 40px; margin-bottom: 32px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; opacity: 0.4; transition: 0.3s; }
    .step.active { opacity: 1; }
    .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--stroke); color: var(--ink); display: grid; place-items: center; font-weight: 800; font-size: 14px; }
    .step.active .step-num { background: var(--brand); color: #fff; box-shadow: 0 0 0 4px var(--brand-ring); }
    .step-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .branch-cats{display:flex;flex-direction:column;gap:12px}
    .branch-cat{border:1px solid var(--stroke);border-radius:18px;overflow:hidden;background:var(--card)}
    .branch-cat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);cursor:pointer;border-bottom:1px solid var(--stroke);transition:background 0.2s; gap: 8px; flex-wrap: wrap; }
    .branch-cat-head:hover{background:#eef2ff}
    .branch-cat-name{font-weight:800;font-size:14px;display:flex;align-items:center;gap:10px; color: var(--ink); flex: 1; min-width: 140px; }
    .branch-cat-name svg{color:var(--muted);flex-shrink:0}
    .branch-cat-count{font-size:11px;color:var(--muted);font-weight:600;background:var(--bg);padding:2px 8px;border-radius:100px;border:1px solid var(--stroke); white-space: nowrap; }
    .branch-cat-toggle{font-size:11px;font-weight:700;color:var(--brand);cursor:pointer;background:var(--brand-soft);padding:5px 12px;border-radius:100px;border:none;font-family:inherit;transition:0.2s; white-space: nowrap; }
    .branch-cat-toggle:hover{background:var(--brand);color:#fff}
    .branch-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:4px;padding:12px}
    .branch-opt{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;font-size:12px;font-weight:600;color:var(--ink2);border:1.5px solid transparent}
    .branch-opt:hover{background:var(--bg);border-color:var(--stroke)}
    .branch-opt.selected{background:var(--brand-soft);border-color:var(--brand-ring);color:var(--brand)}
    .branch-chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--stroke);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:10px}
    .branch-opt.selected .branch-chk{background:var(--brand);border-color:var(--brand);color:#fff}
    .branch-select-all{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--brand-soft);border:1px solid var(--brand-ring);border-radius:14px;margin-bottom:16px;cursor:pointer;transition:0.2s;font-weight:700;font-size:13px;color:var(--brand)}
    .branch-select-all:hover{background:#fde2e2}
    
    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .chip { background: var(--brand-soft); color: var(--brand); padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 8px; border: 1px solid var(--brand-ring); }
    .chip-remove { cursor: pointer; font-size: 16px; opacity: 0.6; }
    .chip-remove:hover { opacity: 1; }

    .loader-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px; color: var(--muted); }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--stroke); border-top-color: var(--brand); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .wrap { padding: 20px 16px; }
      .card { padding: 24px 16px; border-radius: 24px; }
      .steps { gap: 20px; margin-bottom: 24px; }
      .step-num { width: 28px; height: 28px; font-size: 12px; }
      .step-lbl { font-size: 10px; }
      .branch-cat-head { padding: 12px; }
      .branch-cat-name { font-size: 13px; }
      .branch-cat-toggle { font-size: 10px; padding: 4px 10px; }
      .btn { padding: 14px; font-size: 14px; border-radius: 14px; }
      .branch-list { grid-template-columns: 1fr; }
    }

    .greeting { 
      background: linear-gradient(to right, var(--brand-soft), #fff); 
      color: var(--ink); 
      padding: 16px 24px; 
      border-radius: 16px; 
      margin-bottom: 32px; 
      font-size: 15px; 
      font-weight: 600; 
      border: 1px solid var(--stroke); 
      border-left: 5px solid var(--brand);
      display: none; 
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    .greeting b { color: var(--brand); font-weight: 800; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div id="helloBanner" class="greeting"></div>
      
      <div class="page-hero">
        <div style="display:inline-block; background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:100px; font-size:11px; font-weight:800; margin-bottom:12px; letter-spacing:1px; border:1px solid rgba(255,255,255,0.3)">MHT-CET HUB</div>
        <h1>MHT CET College Predictor</h1>
        <p>Strategic predictor for Maharashtra engineering admissions. Uses your rank and percentile to find the most accurate college matches.</p>
      </div>

      <div class="card">
        <div class="steps">
          <div class="step active" id="step1">
            <div class="step-num">1</div>
            <div class="step-lbl">Score</div>
          </div>
          <div class="step" id="step2">
            <div class="step-num">2</div>
            <div class="step-lbl">Profile</div>
          </div>
          <div class="step" id="step3">
            <div class="step-num">3</div>
            <div class="step-lbl">Branches</div>
          </div>
        </div>

        <!-- STEP 1: SCORES -->
        <div class="panel active" id="panel1">
          <div style="display:flex; background:var(--bg); padding:4px; border-radius:14px; margin-bottom:24px; border:1px solid var(--stroke)">
            <button id="tabPct" onclick="switchScoreType('pct')" style="flex:1; padding:10px; border:none; border-radius:10px; font-family:Lexend,sans-serif; font-weight:700; font-size:13px; cursor:pointer; background:var(--brand); color:#fff; transition:0.2s">MHT-CET Percentile</button>
            <button id="tabRank" onclick="switchScoreType('rank')" style="flex:1; padding:10px; border:none; border-radius:10px; font-family:Lexend,sans-serif; font-weight:700; font-size:13px; cursor:pointer; background:transparent; color:var(--muted); transition:0.2s">MHT-CET Rank</button>
          </div>

          <div id="pctGroup" class="form-group">
            <label class="form-label">MHT-CET Percentile</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <input type="number" id="inPercentile" placeholder="e.g. 98.45" step="0.0001" min="0" max="100">
            </div>
          </div>

          <div id="rankGroup" class="form-group" style="display:none">
            <label class="form-label">MHT-CET State Merit Rank</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <input type="number" id="inRank" placeholder="e.g. 12500" min="1">
            </div>
          </div>
          
          <button class="btn" onclick="goStep(2)">
            Continue to Profile
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>

        <!-- STEP 2: PROFILE -->
        <div class="panel" id="panel2">
          <div class="form-group">
            <label class="form-label">Seat Type (Gender)</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <select id="inGender">
                <option value="G">General (All Candidates)</option>
                <option value="L">Ladies (Female Candidates)</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">University / Seat Quota</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <select id="inUniversity">
                <option value="H">Home University (HU)</option>
                <option value="O">Other than Home University (OHU)</option>
                <option value="S">State Level Seats (SL)</option>
                <option value="all">All Quotas (H, O, S)</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">College Region</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <select id="inRegion">
                <option value="all">All Regions</option>
                <option value="1">Amravati Region</option>
                <option value="2">Aurangabad Region</option>
                <option value="3">Mumbai Region</option>
                <option value="4">Nagpur Region</option>
                <option value="5">Nashik Region</option>
                <option value="6">Pune Region</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Candidate Category</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <select id="inCategory">
                <option value="OPEN">OPEN / General</option>
                <option value="OBC">OBC</option>
                <option value="SC">SC</option>
                <option value="ST">ST</option>
                <option value="VJ">VJ / DT / NT-A</option>
                <option value="NT1">NT-B</option>
                <option value="NT2">NT-C</option>
                <option value="NT3">NT-D</option>
                <option value="EWS">EWS</option>
                <option value="TFWS">TFWS</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Minority Preference (Optional)</label>
            <div class="input-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <select id="inMinority">
                <option value="">None (All Colleges)</option>
                <option value="Muslim">Religious Minority - Muslim</option>
                <option value="Jain">Religious Minority - Jain</option>
                <option value="Christian">Religious Minority - Christian</option>
                <option value="Roman Catholics">Religious Minority - Roman Catholics</option>
                <option value="Sikh">Religious Minority - Sikh</option>
                <option value="Buddhist">Religious Minority - Buddhist</option>
                <option value="Gujarathi">Linguistic Minority - Gujarathi</option>
                <option value="Hindi">Linguistic Minority - Hindi</option>
                <option value="Sindhi">Linguistic Minority - Sindhi</option>
                <option value="Kannada">Linguistic Minority - Kannada</option>
                <option value="Malyalam">Linguistic Minority - Malyalam</option>
                <option value="Punjabi">Linguistic Minority - Punjabi</option>
                <option value="Tamil">Linguistic Minority - Tamil</option>
              </select>
            </div>
          </div>
          <div style="display:flex; gap:12px">
            <button class="btn btn-ghost" onclick="goStep(1)" style="flex:1">Back</button>
            <button class="btn" onclick="goStep(3)" style="flex:2">Continue to Branches</button>
          </div>
        </div>

        <!-- STEP 3: BRANCHES -->
        <div class="panel" id="panel3">
          <div class="form-group">
            <label class="form-label">Select Preferred Branches</label>
            <div class="branch-panel" id="branchPanel"></div>
            <div class="chips-row" id="branchChips"></div>
          </div>
          <div style="display:flex; gap:12px; margin-top:24px">
            <button class="btn btn-ghost" onclick="goStep(2)" style="flex:1">Back</button>
            <button class="btn" id="predictBtn" onclick="predict()" disabled style="flex:2">
              Generate Predictor Results
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </div>

        <div id="dataLoader" class="loader-wrap">
          <div class="spinner"></div>
          <span>Synchronizing MHT-CET data matrix...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';
    let allData = [];
    let collegeMetadata = [];
    let selectedBranches = new Set();
    let allBranchNames = [];
    let expandedCats = new Set();

    const CATS = {
      'Computer & IT': ['COMPUTER', 'INFORMATION TECHNOLOGY', 'AI', 'ARTIFICIAL', 'DATA SCIENCE', 'MACHINE LEARNING', 'SOFTWARE', 'CYBER', 'ROBOTICS'],
      'Electronics & Telecom': ['ELECTRONICS', 'TELECOMMUNICATION', 'ENTC', 'COMMUNICATION', 'INSTRUMENTATION'],
      'Core Engineering': ['MECHANICAL', 'CIVIL', 'ELECTRICAL', 'CHEMICAL', 'PRODUCTION', 'METALLURGY', 'AUTOMOBILE', 'TEXTILE', 'MINING'],
      'Biotech & Allied': ['BIOTECHNOLOGY', 'BIO-MEDICAL', 'BIO MEDICAL', 'FOOD', 'AGRICULTURE', 'PHARMACEUTICAL'],
      'Other Branches': []
    };

    function categorizeBranch(b) {
      const u = b.toUpperCase();
      for (const [cat, kws] of Object.entries(CATS)) {
        if (cat === 'Other Branches') continue;
        if (kws.some(k => { const re = new RegExp('\\b' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'); return re.test(u) })) return cat;
      }
      return 'Other Branches';
    }

    let scoreType = 'pct';
    function switchScoreType(type) {
      scoreType = type;
      document.getElementById('pctGroup').style.display = type === 'pct' ? 'block' : 'none';
      document.getElementById('rankGroup').style.display = type === 'rank' ? 'block' : 'none';
      
      const tabPct = document.getElementById('tabPct');
      const tabRank = document.getElementById('tabRank');
      
      if (type === 'pct') {
        tabPct.style.background = 'var(--brand)';
        tabPct.style.color = '#fff';
        tabRank.style.background = 'transparent';
        tabRank.style.color = 'var(--muted)';
      } else {
        tabRank.style.background = 'var(--brand)';
        tabRank.style.color = '#fff';
        tabPct.style.background = 'transparent';
        tabPct.style.color = 'var(--muted)';
      }
    }

    function predict() {
      const pctVal = document.getElementById('inPercentile').value;
      const rankVal = document.getElementById('inRank').value;
      const pct = parseFloat(pctVal);
      const rank = parseInt(rankVal);
      const cat = document.getElementById('inCategory').value;
      const gender = document.getElementById('inGender').value;
      const univ = document.getElementById('inUniversity').value;
      const region = document.getElementById('inRegion').value;
      const minorityPref = document.getElementById('inMinority').value;

      if (!pctVal && !rankVal) return alert('Enter at least Percentile or Rank');

      if (!allData.length) return alert("Data is loading, please wait...");

      let filtered = allData;
      
      // Filter by Percentile or Rank (MUTUALLY EXCLUSIVE)
      if (scoreType === 'pct') {
        if (!pctVal || isNaN(pct)) return alert('Please enter a valid percentile');
        filtered = filtered.filter(r => r.percentile <= pct);
      } else {
        if (!rankVal || isNaN(rank)) return alert('Please enter a valid rank');
        filtered = filtered.filter(r => r.rank >= rank);
      }

      // Gender (Seat Type Prefix)
      filtered = filtered.filter(r => (r.seatType||'').startsWith(gender));

      // University / Quota (Seat Type Suffix)
      if (univ !== 'all') {
        filtered = filtered.filter(r => (r.seatType||'').endsWith(univ));
      } else {
        filtered = filtered.filter(r => {
          const s = r.seatType || '';
          return s.endsWith('H') || s.endsWith('O') || s.endsWith('S');
        });
      }
      
      // Region Filter
      if (region !== 'all') {
        filtered = filtered.filter(r => String(r.code || '').startsWith(region));
      }

      // Category matching
      const catKey = cat === 'OPEN' ? 'OPEN' : cat;
      filtered = filtered.filter(r => (r.seatType||'').includes(catKey));

      // Minority Filter
      if (minorityPref) {
        filtered = filtered.filter(r => {
          const meta = collegeMetadata.find(m => m.code === parseInt(r.code));
          return meta && meta.status && meta.status.toLowerCase().includes(minorityPref.toLowerCase());
        });
      }

      // Branch Filter
      if (selectedBranches.size > 0) {
        filtered = filtered.filter(r => {
          const b = r.branch.trim().toUpperCase();
          return Array.from(selectedBranches).some(sb => b.includes(sb.toUpperCase()));
        });
      }

      filtered.sort((a,b) => b.percentile - a.percentile);

      localStorage.setItem("results", JSON.stringify(filtered.slice(0, 150)));
      localStorage.setItem("searchMeta", JSON.stringify({
        percentile: scoreType === 'pct' ? pct : 'N/A',
        rank: scoreType === 'rank' ? (rank === 999999 ? 'N/A' : rank) : 'N/A',
        category: cat,
        gender: gender === 'G' ? 'General' : 'Ladies',
        university: univ === 'H' ? 'Home University' : (univ === 'O' ? 'Other Than Home' : 'State Level'),
        region: region === 'all' ? 'All Regions' : (region === '1' ? 'Amravati' : (region === '2' ? 'Aurangabad' : (region === '3' ? 'Mumbai' : (region === '4' ? 'Nagpur' : (region === '5' ? 'Nashik' : 'Pune'))))),
        minority: minorityPref || 'None'
      }));
      window.location.href = "results.html";
    }

    function renderBranchPanel() {
      const panel = document.getElementById('branchPanel');
      const grouped = {};
      Object.keys(CATS).forEach(c => grouped[c] = []);
      allBranchNames.forEach(b => { const cat = categorizeBranch(b); grouped[cat].push(b) });

      let html = `<div class="branch-select-all" onclick="toggleAllBranches()">
        <div class="branch-chk" id="chkAll">${selectedBranches.size === allBranchNames.length ? '✓' : ''}</div> 
        Select All Branches (${allBranchNames.length})
      </div>`;

      html += '<div class="branch-cats">';
      Object.entries(grouped).forEach(([cat, branches]) => {
        if (!branches.length) return;
        const selInCat = branches.filter(b => selectedBranches.has(b)).length;
        const isAllInCat = selInCat === branches.length;
        const isExpanded = expandedCats.has(cat);

        html += `<div class="branch-cat">
          <div class="branch-cat-head" onclick="toggleCatCollapse('${cat.replace(/'/g, "\\'")}')">
            <div class="branch-cat-name">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              ${cat}
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="branch-cat-count">${selInCat}/${branches.length}</span>
              <button class="branch-cat-toggle" onclick="event.stopPropagation();toggleCategory('${cat.replace(/'/g, "\\'")}')">
                ${isAllInCat ? 'Deselect' : 'Select All'}
              </button>
            </div>
          </div>
          <div class="branch-list" style="display:${isExpanded ? 'grid' : 'none'}">`;
        
        branches.forEach(b => {
          const sel = selectedBranches.has(b) ? 'selected' : '';
          html += `<div class="branch-opt ${sel}" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">
            <div class="branch-chk">${sel ? '✓' : ''}</div>
            <span>${b}</span>
          </div>`;
        });
        
        html += '</div></div>';
      });
      html += '</div>';
      panel.innerHTML = html;
      renderChips();
    }

    function toggleCatCollapse(cat) {
      if (expandedCats.has(cat)) expandedCats.delete(cat);
      else expandedCats.add(cat);
      renderBranchPanel();
    }

    function toggleBranch(b) {
      if (selectedBranches.has(b)) selectedBranches.delete(b);
      else selectedBranches.add(b);
      renderBranchPanel();
    }

    function toggleCategory(cat) {
      const grouped = {};
      Object.keys(CATS).forEach(c => grouped[c] = []);
      allBranchNames.forEach(b => { grouped[categorizeBranch(b)].push(b) });
      const branches = grouped[cat] || [];
      const allSel = branches.every(b => selectedBranches.has(b));
      branches.forEach(b => { if (allSel) selectedBranches.delete(b); else selectedBranches.add(b) });
      renderBranchPanel();
    }

    function toggleAllBranches() {
      if (selectedBranches.size === allBranchNames.length) { selectedBranches.clear() }
      else { allBranchNames.forEach(b => selectedBranches.add(b)) }
      renderBranchPanel();
    }

    function renderChips() {
      const row = document.getElementById('branchChips');
      if (!row) return;
      row.innerHTML = '';
      if (selectedBranches.size > 0) {
        row.innerHTML = `<span class="chip">${selectedBranches.size} branches selected</span>`;
        if (selectedBranches.size <= 5) {
          row.innerHTML = Array.from(selectedBranches).map(b => `<span class="chip">${b} <span class="chip-remove" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">×</span></span>`).join('');
        }
      }
    }

    function goStep(n) {
      if (n > 1) {
        if (scoreType === 'pct') {
          const p = document.getElementById('inPercentile').value;
          if (!p || isNaN(parseFloat(p))) return alert('Please enter your percentile first');
        } else {
          const r = document.getElementById('inRank').value;
          if (!r || isNaN(parseInt(r))) return alert('Please enter your rank first');
        }
      }
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel' + n).classList.add('active');
      document.querySelectorAll('.step').forEach((s, i) => {
        if (i + 1 <= n) s.classList.add('active');
        else s.classList.remove('active');
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;
      const user = getSession();
      if (user) { 
        const banner = document.getElementById('helloBanner');
        banner.innerHTML = `<span>👋</span> Hi <b>${user.name}</b>, ready to find your ideal MHT-CET college?`; 
        banner.style.display = 'flex'; 
      }

      try {
        const res = await fetch('data.json');
        const json = await res.json();
        const raw = json["MHT-CET College Data"] || [];
        allData = raw.map(r => ({
          code: r["Institute Code"],
          name: r["Institute"],
          branch: r["Branch"],
          percentile: parseFloat(r["Percentile"] || 0),
          rank: parseInt(r["Rank"] || 999999),
          seatType: r["Seat Type"]
        }));

        const bSet = new Set();
        allData.forEach(r => { if(r.branch) bSet.add(r.branch.trim()); });
        allBranchNames = Array.from(bSet).sort();
        renderBranchPanel();

        const rm = await fetch('college-data.json');
        const jm = await rm.json();
        collegeMetadata = (jm["college-data"] || []).map(m => ({
          code: parseInt(m["Institute Code"]),
          status: m["Status"] || ""
        }));

        // Handle URL Params for Rank
        const params = new URLSearchParams(window.location.search);
        const urlRank = params.get('rank');
        if (urlRank) {
          switchScoreType('rank');
          document.getElementById('inRank').value = urlRank;
        }

        document.getElementById('predictBtn').disabled = false;
        document.getElementById('dataLoader').style.display = 'none';
      } catch(e) {
        console.error(e);
        document.getElementById('dataLoader').innerHTML = '<span style="color:var(--brand)">Failed to load data. Please refresh.</span>';
      }
    }

    window.predict = predict;
    window.goStep = goStep;
    window.switchScoreType = switchScoreType;
    window.toggleBranch = toggleBranch;
    window.toggleCategory = toggleCategory;
    window.toggleAllBranches = toggleAllBranches;
    window.toggleCatCollapse = toggleCatCollapse;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
