<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Predictor for All India Rank Admissions — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626; --brand-d: #991b1b; --brand-soft: #fef2f2; --brand-ring: rgba(220, 38, 38, 0.15);
      --ink: #0f172a; --ink2: #475569; --muted: #94a3b8; --bg: #f8fafc; --card: #ffffff; --stroke: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; padding-top: 80px; }
    
    .wrap { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }
    .page-hero { background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%); border-radius: 24px; padding: 32px; margin-bottom: 32px; color: #fff; box-shadow: 0 10px 30px rgba(220, 38, 38, 0.2); }
    .page-hero h1 { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .page-hero p { font-size: 14px; opacity: 0.9; line-height: 1.6; }

    .card { background: var(--card); border: 1px solid var(--stroke); border-radius: 20px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    label { display: block; font-weight: 700; font-size: 12px; color: var(--muted); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--stroke); border-radius: 12px; font-family: inherit; font-size: 14px; outline: none; transition: 0.2s; background: #fff; color: var(--ink); }
    input:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-ring); }

    .radio-row { display: flex; gap: 20px; margin-top: 8px; }
    .radio-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .radio-item input { width: auto; cursor: pointer; }

    .branch-trigger { width: 100%; padding: 12px 16px; border: 1.5px solid var(--stroke); border-radius: 12px; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #fff; }
    .branch-panel { display: none; position: absolute; z-index: 100; background: #fff; border: 1px solid var(--stroke); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 300px; overflow-y: auto; width: 100%; margin-top: 5px; }
    .branch-panel.open { display: block; }
    .branch-option { padding: 10px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f3f4f6; }
    .branch-option:hover { background: #f9fafb; }
    .branch-option.selected { background: var(--brand-soft); color: var(--brand); font-weight: 600; }

    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .chip { background: var(--brand-soft); color: var(--brand); padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .chip-remove { cursor: pointer; font-size: 14px; line-height: 1; }

    .btn { width: 100%; padding: 16px; background: var(--brand); color: #fff; border: none; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 32px; transition: 0.3s; box-shadow: 0 8px 20px rgba(220, 38, 38, 0.2); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(220, 38, 38, 0.3); }
    
    .greeting { background: var(--brand-soft); color: var(--brand); padding: 12px 16px; border-radius: 12px; margin-bottom: 24px; font-size: 13px; font-weight: 600; border-left: 4px solid var(--brand); display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div id="helloBanner" class="greeting"></div>
      
      <div class="page-hero">
        <h1>College Predictor for All India Rank Admissions</h1>
        <p>Expert analytical tool for candidates targeting premier engineering colleges in Maharashtra via the JEE Mains All India (AI) quota.</p>
      </div>

      <div class="card">
        <div class="form-group">
          <label class="form-label">Prediction Method</label>
          <div class="radio-row">
            <label class="radio-item"><input type="radio" name="method" value="Percentile" checked> JEE Percentile</label>
            <label class="radio-item"><input type="radio" name="method" value="Rank"> All India Rank</label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" id="scoreLabel">Enter JEE Percentile</label>
          <input type="text" id="score" placeholder="e.g. 96.5">
        </div>

        <div class="form-group">
          <label class="form-label">Select Preferred Branches</label>
          <div style="position:relative">
            <div class="branch-trigger" id="branchTrigger">
              <span id="triggerText">All Branches Selected</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="branch-panel" id="branchPanel"></div>
          </div>
          <div class="chips-row" id="branchChips"></div>
        </div>

        <button class="btn" id="predictBtn" onclick="predictCollege()" disabled>
          Analyze Potential Colleges
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <div id="dataLoader" class="loader-wrap">
          <div class="spinner"></div>
          <span>Synchronizing AI seat matrix...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    'use strict';
    let allData = null;
    let selectedBranches = new Set(['__all__']);
    let allBranchNames = [];

    function renderBranchPanel() {
      const panel = document.getElementById('branchPanel');
      panel.innerHTML = `<div class="branch-option ${selectedBranches.has('__all__')?'selected':''}" onclick="toggleBranch('__all__')">All Branches</div>`;
      allBranchNames.forEach(b => {
        panel.innerHTML += `<div class="branch-option ${selectedBranches.has(b)?'selected':''}" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">${b}</div>`;
      });
      renderChips();
    }

    function toggleBranch(b) {
      if (b === '__all__') { selectedBranches.clear(); selectedBranches.add('__all__'); }
      else { selectedBranches.delete('__all__'); if (selectedBranches.has(b)) selectedBranches.delete(b); else selectedBranches.add(b); }
      if (selectedBranches.size === 0) selectedBranches.add('__all__');
      renderBranchPanel();
    }

    function renderChips() {
      const row = document.getElementById('branchChips');
      if (!row) return;
      row.innerHTML = '';
      selectedBranches.forEach(b => {
        row.innerHTML += `<span class="chip">${b === '__all__' ? 'All Branches' : b} <span class="chip-remove" onclick="toggleBranch('${b.replace(/'/g, "\\'")}')">×</span></span>`;
      });
      document.getElementById('triggerText').textContent = selectedBranches.has('__all__') ? 'All Branches' : `${selectedBranches.size} Branches Selected`;
    }

    function predictCollege() {
      const score = parseFloat(document.getElementById('score').value);
      if (isNaN(score)) return alert('Enter a valid score');
      const method = document.querySelector('input[name="method"]:checked').value;
      
      let filtered = allData;
      if (method === 'Percentile') {
        filtered = filtered.filter(r => r.percentile <= score).sort((a,b) => b.percentile - a.percentile);
      } else {
        filtered = filtered.filter(r => r.meritRank <= score && r.meritRank > 0).sort((a,b) => a.meritRank - b.meritRank);
      }
      
      if (!selectedBranches.has('__all__')) {
        filtered = filtered.filter(r => selectedBranches.has(r.branch.trim()));
      }
      
      localStorage.setItem("results", JSON.stringify(filtered.slice(0, 80)));
      window.location.href = "results.html";
    }

    function boot() {
      if (!initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) return;

      const banner = document.getElementById('helloBanner');
      const user = getSession();
      if (user && banner) { banner.textContent = `Hi ${user.name}, let's find your dream college based on your JEE scores.`; banner.style.display = 'block'; }

      fetch('jee_data.json').then(r => r.json()).then(json => {
        const raw = Array.isArray(json) ? json : (json[Object.keys(json)[0]] || []);
        allData = raw.map(r => ({
          exam: 'JEE',
          code: r["College Code"] || r["Institute Code"],
          name: r["Institute Name"] || r["Institute"],
          branch: r["Branch Name"] || r["Branch"],
          percentile: parseFloat(r["JEE Percentile"] || r["Percentile"] || 0),
          meritRank: parseInt(r["All India Merit"] || r["Rank"] || 0),
          seatType: r["Seat Type"] || 'AI',
          url: r["College Url"] || '#'
        }));

        const bSet = new Set();
        allData.forEach(r => { if(r.branch) bSet.add(r.branch.trim()); });
        allBranchNames = Array.from(bSet).sort();
        renderBranchPanel();

        document.getElementById('predictBtn').disabled = false;
        document.getElementById('dataLoader').style.display = 'none';
      }).catch(err => {
        console.error("Error loading JoSAA data:", err);
        document.getElementById('dataLoader').innerHTML = '<span style="color:var(--brand)">Sync failed. Please refresh.</span>';
      });

      document.getElementById('branchTrigger').onclick = () => document.getElementById('branchPanel').classList.toggle('open');
      document.addEventListener('click', e => { 
        const trigger = document.getElementById('branchTrigger');
        const panel = document.getElementById('branchPanel');
        if (!trigger || !panel) return;
        if (!e.target.closest('#branchTrigger') && !e.target.closest('#branchPanel')) panel.classList.remove('open'); 
      });

      document.querySelectorAll('input[name="method"]').forEach(r => r.onchange = () => {
        const m = document.querySelector('input[name="method"]:checked').value;
        document.getElementById('scoreLabel').textContent = m === 'Rank' ? 'Enter All India Rank' : 'Enter JEE Percentile';
        document.getElementById('score').placeholder = m === 'Rank' ? 'e.g. 24500' : 'e.g. 96.5';
      });
    }

    window.toggleBranch = toggleBranch;
    window.predictCollege = predictCollege;

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
