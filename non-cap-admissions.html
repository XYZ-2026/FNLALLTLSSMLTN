<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NON-CAP Admissions — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626;
      --brand-soft: #fef2f2;
      --brand-ring: rgba(220, 38, 38, 0.1);
      --ink: #111827;
      --ink2: #374151;
      --muted: #6b7280;
      --bg: #fafafa;
      --card: #ffffff;
      --stroke: #e5e7eb;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    }

    [data-theme="dark"] {
      --ink: #f9fafb;
      --ink2: #e5e7eb;
      --muted: #9ca3af;
      --bg: #030712;
      --card: #111827;
      --stroke: #1f2937;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 20px;
    }

    .header-section {
      text-align: center;
      margin-bottom: 48px;
    }

    .header-section h1 {
      font-family: 'Lexend', sans-serif;
      font-size: 32px;
      color: var(--brand);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-section h1 svg {
      color: var(--brand);
    }

    /* ACCORDION UI */
    .cap-accordion { 
      background: var(--card); 
      border: 1px solid var(--stroke); 
      border-radius: 24px; 
      box-shadow: var(--shadow); 
      overflow: hidden; 
      margin-bottom: 16px; 
      transition: all 0.3s ease;
    }
    
    .cap-college-btn { 
      width: 100%; 
      padding: 24px 32px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border: none; 
      background: none; 
      cursor: pointer; 
      color: var(--ink); 
      font-family: 'Lexend', sans-serif; 
      font-weight: 700; 
      font-size: 18px; 
      text-align: left; 
    }

    .cap-college-btn:hover { background: var(--brand-soft); }
    .cap-college-btn svg.chevron { transition: transform 0.3s; color: var(--muted); }
    .cap-college-btn.active svg.chevron { transform: rotate(180deg); color: var(--brand); }

    .cap-content { 
      display: none; 
      padding: 0 32px 32px; 
    }
    .cap-content.active { display: block; animation: fadeIn 0.3s ease; }

    .cap-year-btn { 
      width: 100%; 
      padding: 14px 20px; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      background: var(--bg); 
      border: 1px solid var(--stroke); 
      border-radius: 14px; 
      font-weight: 800; 
      font-size: 14px; 
      margin-top: 12px; 
      cursor: pointer; 
      color: var(--ink);
      font-family: inherit;
      transition: all 0.2s;
    }
    .cap-year-btn:hover { border-color: var(--brand); }
    .cap-year-btn svg { color: #f59e0b; }
    .cap-year-btn .chevron-sm { margin-left: auto; transition: transform 0.3s; color: var(--muted); }
    .cap-year-btn.active .chevron-sm { transform: rotate(180deg); color: var(--brand); }

    .cap-year-content { 
      display: none; 
      padding: 12px 0 0 20px; 
      border-left: 2px solid var(--brand-ring);
      margin-left: 10px;
    }
    .cap-year-content.active { display: block; animation: fadeIn 0.2s ease; }

    .cap-doc-item { 
      display: flex; 
      align-items: center; 
      gap: 14px; 
      background: var(--card); 
      padding: 14px 20px; 
      border-radius: 14px; 
      margin-bottom: 8px; 
      font-size: 14px; 
      font-weight: 600; 
      color: var(--ink2); 
      text-decoration: none; 
      border: 1px solid var(--stroke); 
      transition: all 0.2s; 
    }
    .cap-doc-item:hover { 
      border-color: var(--brand); 
      background: var(--brand-soft); 
      color: var(--brand); 
      transform: translateX(6px); 
    }
    .cap-doc-item svg { color: var(--muted); }

    .cap-unlock-btn { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 12px; 
      width: 100%; 
      padding: 18px; 
      background: var(--brand); 
      color: #fff !important; 
      border-radius: 14px; 
      text-decoration: none; 
      font-weight: 800; 
      font-size: 15px; 
      margin-top: 16px; 
      box-shadow: 0 4px 12px var(--brand-ring); 
      transition: all 0.2s;
    }
    .cap-unlock-btn:hover { 
      opacity: 0.9;
      transform: translateY(-2px); 
      box-shadow: 0 6px 16px var(--brand-ring);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .header-section h1 { font-size: 24px; }
      .cap-college-btn { padding: 20px; font-size: 16px; }
      .cap-content { padding: 0 20px 20px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header-section">
      <h1>
        NON-CAP Admissions
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </h1>
      <p style="color:var(--muted); margin-top:12px; font-weight:500">Access offline admission notices, spot round details, and institutional round documents.</p>
    </div>

    <div id="capAccordionWrap">
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <p>Loading admission notices...</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    async function init() {
      initAuth();
      await fetchNonCap();
    }

    async function fetchNonCap() {
      const res = await authApi('getNonCapAdmissions', {});
      if (res.ok) {
        renderNonCap(res.data || []);
      } else {
        document.getElementById('capAccordionWrap').innerHTML = `<div class="empty-state"><p>Error loading data: ${res.error}</p></div>`;
      }
    }

    function renderNonCap(data) {
      const wrap = document.getElementById('capAccordionWrap');
      if (!data.length) {
        wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><p>No admission notices found at the moment.</p></div>`;
        return;
      }

      const session = getSession();
      const isPremium = session && (session.role === 'premium' || session.role === 'admin');

      // Group by college
      const groups = {};
      data.forEach(n => {
        if (!groups[n.college]) groups[n.college] = {};
        if (!groups[n.college][n.year]) groups[n.college][n.year] = [];
        groups[n.college][n.year].push(n);
      });

      wrap.innerHTML = Object.keys(groups).map(college => {
        const years = groups[college];
        return `
          <div class="cap-accordion">
            <button class="cap-college-btn" onclick="toggleCap(this)">
              ${escAuth(college)}
              <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="cap-content">
              ${Object.keys(years).sort((a,b) => b-a).map(year => `
                <div class="cap-year-folder">
                  <button class="cap-year-btn" onclick="toggleCap(this)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 7h-8l-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
                    ${year}
                    <svg class="chevron-sm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>
                  </button>
                  <div class="cap-year-content">
                    ${years[year].map(n => `
                      ${isPremium ? `
                        <a href="${escAuth(n.link)}" target="_blank" class="cap-doc-item">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                          ${escAuth(n.title)}
                        </a>
                      ` : `
                        <div class="cap-doc-item" style="opacity:0.7; cursor:default">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                          ${escAuth(n.title)}
                        </div>
                      `}
                    `).join('')}
                    ${!isPremium ? `
                      <a href="index.html#pricing" class="cap-unlock-btn" style="margin-top:8px">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Unlock All PDFs – Enroll Now
                      </a>
                    ` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleCap(btn) {
      btn.classList.toggle('active');
      btn.nextElementSibling.classList.toggle('active');
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
