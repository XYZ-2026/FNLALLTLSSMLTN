<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Results — College Simplified</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand: #dc2626; --brand-soft: #fef2f2; --ink: #111827; --muted: #6b7280; --bg: #f4f6fb; --card: #ffffff; --stroke: #e5e7eb;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html, body { overflow-x: hidden; width: 100%; position: relative; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); padding-top: 64px; }
    
    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
    .page-hdr { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; border-bottom: 2px solid var(--stroke); padding-bottom: 16px; }
    .page-hdr h1 { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; }
    
    .table-card { background: var(--card); border: 1px solid var(--stroke); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { background: #f9fafb; padding: 14px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--stroke); }
    td { padding: 14px 16px; font-size: 13px; color: var(--ink); border-bottom: 1px solid var(--stroke); }
    tr:hover { background: #f9fafb; }
    

    
    .college-code { font-family: monospace; background: var(--brand-soft); color: var(--brand); padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="toolArea">
      <div class="page-hdr">
        <div>
          <h1>Prediction Results</h1>
          <p id="resultCount" style="color:var(--muted); font-size:14px; margin-top:4px;">0 colleges matching your profile</p>
        </div>

      </div>

      <div class="table-card">
        <div class="table-scroll">
          <table id="resultsTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Code</th>
                <th>Institute Name</th>
                <th>Branch</th>
                <th>Category / Pool</th>
                <th>Cutoff Rank</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    if (initAuth({ requireLogin: true, toolContainerId: 'toolArea' })) {
      const raw = localStorage.getItem("results");
      let results = [];
      try { if (raw) results = JSON.parse(raw); } catch(e) { results = []; }

      const tbody = document.querySelector("#resultsTable tbody");
      document.getElementById('resultCount').textContent = `${results.length} colleges matching your profile`;

      tbody.innerHTML = results.map((r, i) => `
        <tr>
          <td style="color:var(--muted)">${i + 1}</td>
          <td><span class="college-code">${r.code || '—'}</span></td>
          <td style="font-weight:600; max-width:300px;">${r.name || '—'}</td>
          <td style="color:var(--muted)">${r.branch || '—'}</td>
          <td>${r.seatType || '—'}</td>
          <td style="font-weight:800; color:var(--brand)">${r.percentile || '—'}</td>
          <td>
            <a href="https://fe2025.mahacet.org/StaticPages/frmInstituteSummary?InstituteCode=0${r.code || ''}" target="_blank" style="color:var(--brand); text-decoration:none; font-weight:700; font-size:12px;">Visit Portal →</a>
          </td>
        </tr>
      `).join('');



      // DYNAMIC UI TABLE HEADER
      const metaRaw = localStorage.getItem("searchMeta");
      try {
        if(metaRaw) {
          const meta = JSON.parse(metaRaw);
          if (meta.exam.includes('Rank')) {
            document.querySelector('#resultsTable thead th:nth-child(6)').textContent = 'Cutoff Rank';
            tbody.innerHTML = results.map((r, i) => `
              <tr>
                <td style="color:var(--muted)">${i + 1}</td>
                <td><span class="college-code">${r.code || '—'}</span></td>
                <td style="font-weight:600; max-width:300px;">${r.name || '—'}</td>
                <td style="color:var(--muted)">${r.branch || '—'}</td>
                <td>${r.seatType || '—'}</td>
                <td style="font-weight:800; color:var(--brand)">${r.meritRank || '—'}</td>
                <td>
                  <a href="https://fe2025.mahacet.org/StaticPages/frmInstituteSummary?InstituteCode=${String(r.code || '').padStart(5, '0')}" target="_blank" style="color:var(--brand); text-decoration:none; font-weight:700; font-size:12px;">Visit Portal →</a>
                </td>
              </tr>
            `).join('');
          }
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
