<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Explorer — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #dc2626; --brand-soft: #fef2f2; --ink: #111827; --muted: #6b7280; --bg: #ffffff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--ink); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; padding-top: 84px; }
    
    .container { max-width: 800px; animation: fadeIn 1s ease-out; }
    .status-badge { display: inline-block; padding: 8px 20px; background: var(--brand-soft); color: var(--brand); border-radius: 100px; font-weight: 800; font-size: 12px; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 1.5px; }
    h1 { font-family: 'Poppins', sans-serif; font-weight: 900; font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1; margin-bottom: 24px; letter-spacing: -2px; }
    p { font-size: 1.15rem; color: var(--muted); margin-bottom: 40px; line-height: 1.6; max-width: 600px; margin-left: auto; margin-right: auto; }
    .btn { display: inline-flex; align-items: center; gap: 12px; padding: 16px 32px; background-color: #111827; color: white; text-decoration: none; border-radius: 16px; font-weight: 700; transition: 0.3s; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .btn:hover { background-color: var(--brand); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(220,38,38,0.2); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-badge">Phase II Development</div>
    <h1>JOSAA Elite<br>Coming Soon</h1>
    <p>We are engineering a premium analytical engine for India's top institutes. Stay tuned for a smarter way to navigate your career.</p>
    <a href="cet-landing.html" class="btn">Explore MHT-CET Hub →</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase_config.js"></script>
  <script src="shared_auth.js"></script>
  <script>
    initAuth({ requireLogin: false });
  </script>
</body>
</html>
